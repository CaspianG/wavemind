services:
  wavemind:
    build:
      context: ../..
      args:
        INSTALL_OTEL: "true"
    image: wavemind-observability:local
    environment:
      WAVEMIND_DB: /data/wavemind.sqlite3
      WAVEMIND_ENCODER: hash
      WAVEMIND_INDEX: numpy
      WAVEMIND_LOG_LEVEL: INFO
      WAVEMIND_OTEL_ENABLED: "1"
      WAVEMIND_OTEL_SERVICE_NAME: wavemind-local
      WAVEMIND_OTEL_EXPORTER: otlp
      WAVEMIND_OTEL_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8000:8000"
    volumes:
      - ../../data:/data
      - ../../backups:/backups
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - wavemind
