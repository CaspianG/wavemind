name: external-http-cluster-load

on:
  workflow_dispatch:
    inputs:
      nodes:
        description: "WaveMind API nodes as id=https://host, separated by newlines, commas, or semicolons. Use at least four nodes unless nodes_manifest_json is provided."
        required: false
        default: ""
        type: string
      nodes_manifest_json:
        description: "Optional JSON node manifest with nodes[].id/url/zone plus deployment_id/environment/source."
        required: false
        default: ""
        type: string
      namespace_count:
        description: "Namespaces to exercise."
        required: true
        default: "32"
        type: string
      memories_per_namespace:
        description: "Memories written per namespace. Must be at least 2."
        required: true
        default: "8"
        type: string
      workers:
        description: "Concurrent worker count."
        required: true
        default: "8"
        type: string
      batch_query_size:
        description: "External /query requests to compare against one /query/batch request."
        required: true
        default: "24"
        type: string
      replication_factor:
        description: "Replica count per namespace."
        required: true
        default: "3"
        type: string
      read_quorum:
        description: "Minimum successful replica reads per query."
        required: true
        default: "1"
        type: string
      read_fanout:
        description: "Replica reads attempted per query. Use 1 for quorum-sized hot-path reads."
        required: true
        default: "1"
        type: string
      p99_slo_ms:
        description: "Maximum p99 operation latency."
        required: true
        default: "1000"
        type: string
      commit_results:
        description: "Commit benchmark result and refreshed leaderboard artifacts to main."
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  external-http-cluster-load:
    runs-on: ubuntu-latest
    env:
      WAVEMIND_BENCHMARK_REFRESH_PROFILE: external-http-cluster

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,bench]"

      - name: Run external HTTP cluster load benchmark
        env:
          WAVEMIND_CLUSTER_NODES: ${{ inputs.nodes }}
          WAVEMIND_CLUSTER_NODES_MANIFEST_JSON: ${{ inputs.nodes_manifest_json }}
          WAVEMIND_API_KEY: ${{ secrets.WAVEMIND_API_KEY }}
          NAMESPACE_COUNT: ${{ inputs.namespace_count }}
          MEMORIES_PER_NAMESPACE: ${{ inputs.memories_per_namespace }}
          WORKERS: ${{ inputs.workers }}
          BATCH_QUERY_SIZE: ${{ inputs.batch_query_size }}
          REPLICATION_FACTOR: ${{ inputs.replication_factor }}
          READ_QUORUM: ${{ inputs.read_quorum }}
          READ_FANOUT: ${{ inputs.read_fanout }}
          P99_SLO_MS: ${{ inputs.p99_slo_ms }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          args = [
              sys.executable,
              "benchmarks/http_cluster_load_benchmark.py",
              "--namespace-count",
              os.environ["NAMESPACE_COUNT"],
              "--memories-per-namespace",
              os.environ["MEMORIES_PER_NAMESPACE"],
              "--workers",
              os.environ["WORKERS"],
              "--batch-query-size",
              os.environ["BATCH_QUERY_SIZE"],
              "--replication-factor",
              os.environ["REPLICATION_FACTOR"],
              "--read-quorum",
              os.environ["READ_QUORUM"],
              "--read-fanout",
              os.environ["READ_FANOUT"],
              "--p99-slo-ms",
              os.environ["P99_SLO_MS"],
              "--output",
              "benchmarks/http_cluster_load_results.json",
              "--source",
              "github-actions-workflow",
              "--fail-on-slo",
          ]
          manifest_json = os.environ.get("WAVEMIND_CLUSTER_NODES_MANIFEST_JSON", "").strip()
          if manifest_json:
              manifest_path = Path("external-http-cluster.nodes.json")
              manifest_path.write_text(manifest_json, encoding="utf-8")
              args.extend(["--nodes-file", str(manifest_path)])
          else:
              node_specs = [
                  item.strip()
                  for item in re.split(r"[\n,;]+", os.environ["WAVEMIND_CLUSTER_NODES"])
                  if item.strip()
              ]
              if len(node_specs) < 4:
                  raise SystemExit("external cluster load benchmark requires at least four nodes or nodes_manifest_json")
              args.extend(["--environment", "external"])
              args.extend(["--deployment-id", f"github-actions-{os.environ.get('GITHUB_RUN_ID', 'manual')}"])
              for spec in node_specs:
                  args.extend(["--node", spec])
          api_key = os.environ.get("WAVEMIND_API_KEY")
          if api_key:
              args.extend(["--api-key", api_key])
          subprocess.run(args, check=True)
          PY

      - name: Refresh benchmark report with external cluster result
        run: |
          python benchmarks/benchmark_registry.py \
            --output benchmarks/benchmark_matrix_results.json
          python benchmarks/render_benchmark_report.py
          python benchmarks/render_benchmark_leaderboard.py
          python benchmarks/render_benchmark_charts.py \
            --output docs/assets/benchmark-summary.svg
          python benchmarks/agent_impact_leaderboard.py \
            --output benchmarks/agent_impact_results.json \
            --markdown-output benchmarks/AGENT_IMPACT.md
          python benchmarks/structured_memory_report.py \
            --output benchmarks/structured_memory_results.json \
            --markdown-output benchmarks/STRUCTURED_MEMORY.md
          python benchmarks/memory_os_intelligence_report.py \
            --output benchmarks/memory_os_intelligence_results.json \
            --markdown-output benchmarks/MEMORY_OS_INTELLIGENCE.md
          python benchmarks/cluster_autoscale_report.py \
            --output benchmarks/cluster_autoscale_results.json \
            --markdown-output benchmarks/CLUSTER_AUTOSCALE.md
          python benchmarks/cost_efficiency_leaderboard.py \
            --output benchmarks/cost_efficiency_results.json \
            --markdown-output benchmarks/COST_EFFICIENCY.md
          python benchmarks/render_leaderboard_status.py \
            --output docs/data/leaderboard-status.json
          python benchmarks/validate_benchmark_artifacts.py \
            --max-age-days 8 \
            --output benchmarks/benchmark_artifact_audit.json
          python benchmarks/production_readiness_gate.py \
            --output benchmarks/production_readiness_results.json \
            --markdown-output benchmarks/PRODUCTION_READINESS.md
          python benchmarks/production_evidence_gate.py \
            --output benchmarks/production_evidence_results.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE.md
          python -m wavemind production-evidence-preflight \
            --write-artifacts \
            --output benchmarks/production_evidence_preflight_results.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE_PREFLIGHT.md
          python -m wavemind production-evidence-dispatch \
            --write-artifacts \
            --output benchmarks/production_evidence_dispatch_results.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE_DISPATCH.md
          python -m wavemind production-evidence-bundle \
            --write-artifacts \
            --output benchmarks/production_evidence_bundle_results.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE_BUNDLE.md
          python -m wavemind release-claims \
            --write-artifacts \
            --fail-on-blocked \
            --output benchmarks/release_claims_results.json \
            --markdown-output benchmarks/RELEASE_CLAIMS.md
          python -m wavemind scale-gap \
            --write-artifacts \
            --output benchmarks/scale_gap_results.json \
            --markdown-output benchmarks/SCALE_GAP.md
          python benchmarks/strict_evidence_readiness_report.py \
            --output benchmarks/strict_evidence_readiness_results.json \
            --markdown-output benchmarks/STRICT_EVIDENCE_READINESS.md
          python benchmarks/agent_impact_leaderboard.py \
            --output benchmarks/agent_impact_results.json \
            --markdown-output benchmarks/AGENT_IMPACT.md
          python benchmarks/structured_memory_report.py \
            --output benchmarks/structured_memory_results.json \
            --markdown-output benchmarks/STRUCTURED_MEMORY.md
          python benchmarks/memory_os_intelligence_report.py \
            --output benchmarks/memory_os_intelligence_results.json \
            --markdown-output benchmarks/MEMORY_OS_INTELLIGENCE.md
          python benchmarks/cluster_autoscale_report.py \
            --output benchmarks/cluster_autoscale_results.json \
            --markdown-output benchmarks/CLUSTER_AUTOSCALE.md
          python benchmarks/cost_efficiency_leaderboard.py \
            --output benchmarks/cost_efficiency_results.json \
            --markdown-output benchmarks/COST_EFFICIENCY.md
          python benchmarks/render_leaderboard_status.py \
            --output docs/data/leaderboard-status.json
          python benchmarks/render_benchmark_dashboard.py \
            --output docs/benchmark-dashboard.html

      - name: Commit external cluster result
        if: ${{ inputs.commit_results }}
        run: |
          if git diff --quiet -- benchmarks docs/assets/benchmark-summary.svg docs/benchmark-dashboard.html docs/data/leaderboard-status.json; then
            echo "No benchmark changes."
            exit 0
          fi
          git config user.name "CaspianG"
          git config user.email "259116618+CaspianG@users.noreply.github.com"
          git add benchmarks docs/assets/benchmark-summary.svg docs/benchmark-dashboard.html docs/data/leaderboard-status.json
          git commit -m "Refresh external HTTP cluster benchmark"
          git push

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: external-http-cluster-load
          path: |
            benchmarks/http_cluster_load_results.json
            benchmarks/BENCHMARK_LEADERBOARD.md
            benchmarks/BENCHMARK_REPORT.md
            benchmarks/PRODUCTION_EVIDENCE.md
            benchmarks/PRODUCTION_EVIDENCE_PREFLIGHT.md
            benchmarks/PRODUCTION_EVIDENCE_DISPATCH.md
            benchmarks/PRODUCTION_EVIDENCE_BUNDLE.md
            benchmarks/RELEASE_CLAIMS.md
            benchmarks/SCALE_GAP.md
            benchmarks/STRICT_EVIDENCE_READINESS.md
            benchmarks/PRODUCTION_READINESS.md
            benchmarks/benchmark_artifact_audit.json
            benchmarks/benchmark_matrix_results.json
            benchmarks/production_evidence_results.json
            benchmarks/production_evidence_preflight_results.json
            benchmarks/production_evidence_dispatch_results.json
            benchmarks/production_evidence_bundle_results.json
            benchmarks/release_claims_results.json
            benchmarks/scale_gap_results.json
            benchmarks/strict_evidence_readiness_results.json
            benchmarks/production_readiness_results.json
            docs/benchmark-dashboard.html
            docs/data/leaderboard-status.json
            docs/assets/benchmark-summary.svg
