name: benchmark-leaderboard

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    services:
      qdrant-0:
        image: qdrant/qdrant:v1.15.1
        ports:
          - 6333:6333
      qdrant-1:
        image: qdrant/qdrant:v1.15.1
        ports:
          - 6334:6333
    env:
      WAVEMIND_BENCHMARK_REFRESH_PROFILE: weekly-fast

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,bench]"

      - name: Refresh fast benchmark artifacts
        run: |
          python benchmarks/agent_coherence_benchmark.py \
            --engines wavemind static chroma \
            --memories 500 \
            --output benchmarks/agent_coherence_results.json
          python benchmarks/dynamic_memory_benchmark.py \
            --engines wavemind chroma \
            --memories 200 \
            --output benchmarks/dynamic_memory_results.json
          python benchmarks/field_memory_dynamics_benchmark.py \
            --output benchmarks/field_memory_dynamics_results.json
          python benchmarks/serverless_observed_telemetry_benchmark.py \
            --output deploy/serverless/observed-telemetry.loopback.json
          python benchmarks/scale_readiness_benchmark.py \
            --simulated-memories 1000000 \
            --output benchmarks/scale_readiness_results.json
          python benchmarks/external_http_cluster_loopback.py \
            --deployment-id "weekly-loopback-${{ github.run_id }}" \
            --namespace-prefix "tenant:external-loopback:weekly-${{ github.run_id }}" \
            --fail-on-slo \
            --output benchmarks/http_cluster_load_results.json
          python benchmarks/local_http_active_active_smoke.py \
            --regions 3 \
            --replicas-per-region 3 \
            --namespace-count 2 \
            --timeout 3 \
            --fail-on-slo \
            --output benchmarks/local_http_active_active_smoke_results.json
          python benchmarks/external_http_active_active_loopback.py \
            --regions 3 \
            --replicas-per-region 3 \
            --namespace-count 16 \
            --timeout 3 \
            --deployment-id "weekly-active-active-loopback-${{ github.run_id }}" \
            --fail-on-slo \
            --output benchmarks/external_http_active_active_loopback_results.json
          python benchmarks/production_streaming_load_benchmark.py \
            --sizes 10000 \
            --dim 128 \
            --queries 50 \
            --top-k 10 \
            --batch-size 2000 \
            --engines numpy-streaming \
            --output benchmarks/production_streaming_load_smoke_results.json
          python - <<'PY'
          import time
          import urllib.request

          for port in (6333, 6334):
              url = f"http://127.0.0.1:{port}/readyz"
              deadline = time.time() + 90
              while True:
                  try:
                      with urllib.request.urlopen(url, timeout=2) as response:
                          if response.status == 200:
                              break
                  except Exception:
                      if time.time() >= deadline:
                          raise
                      time.sleep(1)
          PY
          WAVEMIND_QDRANT_URLS=http://127.0.0.1:6333,http://127.0.0.1:6334 \
          WAVEMIND_QDRANT_COLLECTION_PREFIX=wavemind_sharded_smoke \
          WAVEMIND_QDRANT_UPSERT_BATCH_SIZE=500 \
          WAVEMIND_QDRANT_FANOUT_WORKERS=2 \
          WAVEMIND_QDRANT_WAIT_AFTER_BUILD_SECONDS=2 \
          WAVEMIND_QDRANT_WARMUP_QUERIES=10 \
          python benchmarks/production_streaming_load_benchmark.py \
            --sizes 5000 \
            --dim 64 \
            --queries 20 \
            --top-k 10 \
            --batch-size 1000 \
            --engines qdrant-sharded-service \
            --output benchmarks/production_streaming_load_qdrant_sharded_smoke_results.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("benchmarks/production_streaming_load_qdrant_sharded_smoke_results.json").read_text())
          result = payload["results"][0]["results"][0]
          if result["target_recall_at_k"] < 0.95 or result["p99_latency_ms"] > 100 or result["slo_status"] != "pass":
              raise SystemExit(f"sharded Qdrant smoke SLO failed: {result}")
          PY
          python benchmarks/benchmark_registry.py \
            --output benchmarks/benchmark_matrix_results.json
          python benchmarks/render_benchmark_report.py
          python benchmarks/render_benchmark_leaderboard.py
          python benchmarks/render_benchmark_charts.py \
            --output docs/assets/benchmark-summary.svg
          python benchmarks/render_benchmark_dashboard.py \
            --output docs/benchmark-dashboard.html
          python benchmarks/validate_benchmark_artifacts.py \
            --max-age-days 8 \
            --output benchmarks/benchmark_artifact_audit.json
          python benchmarks/production_readiness_gate.py \
            --output benchmarks/production_readiness_results.json \
            --markdown-output benchmarks/PRODUCTION_READINESS.md
          python benchmarks/production_evidence_gate.py \
            --output benchmarks/production_evidence_results.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE.md
          python benchmarks/benchmark_registry.py \
            --output benchmarks/benchmark_matrix_results.json
          python benchmarks/render_benchmark_report.py
          python benchmarks/render_benchmark_leaderboard.py
          python benchmarks/render_benchmark_charts.py \
            --output docs/assets/benchmark-summary.svg
          python benchmarks/render_benchmark_dashboard.py \
            --output docs/benchmark-dashboard.html
          python benchmarks/validate_benchmark_artifacts.py \
            --max-age-days 8 \
            --output benchmarks/benchmark_artifact_audit.json

      - name: Validate benchmark renderers
        run: |
          pytest -q \
            tests/test_benchmark_registry.py \
            tests/test_benchmark_report.py \
            tests/test_benchmark_leaderboard.py \
            tests/test_benchmark_charts.py \
            tests/test_benchmark_dashboard.py \
            tests/test_benchmark_artifact_audit.py \
            tests/test_agent_coherence_benchmark.py \
            tests/test_dynamic_memory_benchmark.py \
            tests/test_field_memory_dynamics_benchmark.py \
            tests/test_serverless_observed_telemetry_benchmark.py \
            tests/test_external_http_cluster_loopback.py \
            tests/test_http_cluster_load_benchmark.py \
            tests/test_external_http_active_active_loopback.py \
            tests/test_local_http_active_active_smoke.py \
            tests/test_scale_readiness_benchmark.py \
            tests/test_production_streaming_load_benchmark.py \
            tests/test_production_readiness_gate.py \
            tests/test_production_evidence_gate.py

      - name: Report benchmark artifact drift
        run: |
          if git diff --quiet -- benchmarks docs/assets/benchmark-summary.svg docs/benchmark-dashboard.html deploy/serverless/observed-telemetry.loopback.json; then
            echo "No benchmark changes."
            exit 0
          fi
          echo "::notice::Benchmark artifacts changed. Download the benchmark-leaderboard artifact and commit the reviewed files from a maintainer account."
          git diff --stat -- benchmarks docs/assets/benchmark-summary.svg docs/benchmark-dashboard.html deploy/serverless/observed-telemetry.loopback.json

      - name: Build GitHub Pages leaderboard
        run: |
          rm -rf site
          mkdir -p site/assets site/benchmarks site/data
          cp docs/benchmark-dashboard.html site/index.html
          cp docs/assets/benchmark-summary.svg site/assets/benchmark-summary.svg
          cp benchmarks/BENCHMARK_LEADERBOARD.md site/benchmarks/BENCHMARK_LEADERBOARD.md
          cp benchmarks/BENCHMARK_REPORT.md site/benchmarks/BENCHMARK_REPORT.md
          cp benchmarks/PRODUCTION_READINESS.md site/benchmarks/PRODUCTION_READINESS.md
          cp benchmarks/PRODUCTION_EVIDENCE.md site/benchmarks/PRODUCTION_EVIDENCE.md
          cp benchmarks/benchmark_matrix_results.json site/data/benchmark_matrix_results.json
          cp benchmarks/benchmark_artifact_audit.json site/data/benchmark_artifact_audit.json
          cp benchmarks/production_readiness_results.json site/data/production_readiness_results.json
          cp benchmarks/production_evidence_results.json site/data/production_evidence_results.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy living leaderboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-leaderboard
          path: |
            benchmarks/BENCHMARK_LEADERBOARD.md
            benchmarks/BENCHMARK_REPORT.md
            benchmarks/agent_coherence_results.json
            benchmarks/benchmark_artifact_audit.json
            benchmarks/benchmark_matrix_results.json
            benchmarks/dynamic_memory_results.json
            benchmarks/field_memory_dynamics_results.json
            benchmarks/http_cluster_load_results.json
            benchmarks/external_http_active_active_loopback_results.json
            benchmarks/local_http_active_active_smoke_results.json
            benchmarks/scale_readiness_results.json
            deploy/serverless/observed-telemetry.loopback.json
            benchmarks/production_streaming_load_smoke_results.json
            benchmarks/production_streaming_load_qdrant_sharded_smoke_results.json
            benchmarks/production_readiness_results.json
            benchmarks/PRODUCTION_READINESS.md
            benchmarks/production_evidence_results.json
            benchmarks/PRODUCTION_EVIDENCE.md
            docs/benchmark-dashboard.html
            docs/assets/benchmark-summary.svg
