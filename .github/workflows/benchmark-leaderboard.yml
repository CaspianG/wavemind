name: benchmark-leaderboard

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    services:
      qdrant-0:
        image: qdrant/qdrant:v1.18.2
        ports:
          - 6333:6333
      qdrant-1:
        image: qdrant/qdrant:v1.18.2
        ports:
          - 6334:6333
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
    env:
      WAVEMIND_BENCHMARK_REFRESH_PROFILE: weekly-fast

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,bench,redis]"

      - name: Refresh fast benchmark artifacts
        run: |
          python benchmarks/agent_coherence_benchmark.py \
            --engines wavemind wavemind-memory-os static chroma \
            --memories 500 \
            --output benchmarks/agent_coherence_results.json
          python benchmarks/agent_coherence_benchmark.py \
            --engines wavemind wavemind-memory-os static \
            --memories 500 \
            --output benchmarks/memory_os_agent_quality_results.json
          python benchmarks/memory_os_ab_benchmark.py \
            --output benchmarks/memory_os_ab_results.json
          python benchmarks/dynamic_memory_benchmark.py \
            --engines wavemind chroma \
            --memories 200 \
            --output benchmarks/dynamic_memory_results.json
          python benchmarks/field_memory_dynamics_benchmark.py \
            --output benchmarks/field_memory_dynamics_results.json
          python benchmarks/serverless_observed_telemetry_benchmark.py \
            --output deploy/serverless/observed-telemetry.loopback.json
          python benchmarks/scale_readiness_benchmark.py \
            --simulated-memories 1000000 \
            --output benchmarks/scale_readiness_results.json
          python benchmarks/external_http_cluster_loopback.py \
            --deployment-id "weekly-loopback-${{ github.run_id }}" \
            --namespace-prefix "tenant:external-loopback:weekly-${{ github.run_id }}" \
            --fail-on-slo \
            --output benchmarks/http_cluster_load_loopback_results.json
          python benchmarks/local_http_active_active_smoke.py \
            --regions 3 \
            --replicas-per-region 3 \
            --namespace-count 2 \
            --timeout 3 \
            --fail-on-slo \
            --output benchmarks/local_http_active_active_smoke_results.json
          python benchmarks/external_http_active_active_loopback.py \
            --regions 3 \
            --replicas-per-region 3 \
            --namespace-count 16 \
            --timeout 3 \
            --deployment-id "weekly-active-active-loopback-${{ github.run_id }}" \
            --fail-on-slo \
            --output benchmarks/external_http_active_active_loopback_results.json
          python benchmarks/production_streaming_load_benchmark.py \
            --sizes 10000 \
            --dim 128 \
            --queries 50 \
            --top-k 10 \
            --batch-size 2000 \
            --engines numpy-streaming \
            --output benchmarks/production_streaming_load_smoke_results.json
          python - <<'PY'
          import time
          import urllib.request

          for port in (6333, 6334):
              url = f"http://127.0.0.1:{port}/readyz"
              deadline = time.time() + 90
              while True:
                  try:
                      with urllib.request.urlopen(url, timeout=2) as response:
                          if response.status == 200:
                              break
                  except Exception:
                      if time.time() >= deadline:
                          raise
                      time.sleep(1)
          PY
          WAVEMIND_QDRANT_URLS=http://127.0.0.1:6333,http://127.0.0.1:6334 \
          WAVEMIND_QDRANT_COLLECTION_PREFIX=wavemind_sharded_smoke \
          WAVEMIND_QDRANT_UPSERT_BATCH_SIZE=500 \
          WAVEMIND_QDRANT_FANOUT_WORKERS=2 \
          WAVEMIND_QDRANT_WAIT_AFTER_BUILD_SECONDS=2 \
          WAVEMIND_QDRANT_WARMUP_QUERIES=10 \
          python benchmarks/production_streaming_load_benchmark.py \
            --sizes 5000 \
            --dim 64 \
            --queries 20 \
            --top-k 10 \
            --batch-size 1000 \
            --engines qdrant-sharded-service \
            --output benchmarks/production_streaming_load_qdrant_sharded_smoke_results.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("benchmarks/production_streaming_load_qdrant_sharded_smoke_results.json").read_text())
          result = payload["results"][0]["results"][0]
          if result["target_recall_at_k"] < 0.95 or result["p99_latency_ms"] > 100 or result["slo_status"] != "pass":
              raise SystemExit(f"sharded Qdrant smoke SLO failed: {result}")
          PY
          python benchmarks/benchmark_registry.py \
            --output benchmarks/benchmark_matrix_results.json
          python benchmarks/render_benchmark_report.py
          python benchmarks/render_benchmark_leaderboard.py
          python benchmarks/render_benchmark_charts.py \
            --output docs/assets/benchmark-summary.svg
          python benchmarks/agent_impact_leaderboard.py \
            --output benchmarks/agent_impact_results.json \
            --markdown-output benchmarks/AGENT_IMPACT.md
          python benchmarks/structured_memory_report.py \
            --output benchmarks/structured_memory_results.json \
            --markdown-output benchmarks/STRUCTURED_MEMORY.md
          python benchmarks/memory_os_intelligence_report.py \
            --output benchmarks/memory_os_intelligence_results.json \
            --markdown-output benchmarks/MEMORY_OS_INTELLIGENCE.md
          python benchmarks/cluster_autoscale_report.py \
            --output benchmarks/cluster_autoscale_results.json \
            --markdown-output benchmarks/CLUSTER_AUTOSCALE.md
          python benchmarks/cost_efficiency_leaderboard.py \
            --output benchmarks/cost_efficiency_results.json \
            --markdown-output benchmarks/COST_EFFICIENCY.md
          python benchmarks/render_leaderboard_status.py \
            --output docs/data/leaderboard-status.json
          python benchmarks/validate_benchmark_artifacts.py \
            --max-age-days 8 \
            --output benchmarks/benchmark_artifact_audit.json
          python benchmarks/production_readiness_gate.py \
            --output benchmarks/production_readiness_results.json \
            --markdown-output benchmarks/PRODUCTION_READINESS.md
          python benchmarks/production_evidence_gate.py \
            --output benchmarks/production_evidence_results.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE.md
          python -m wavemind production-evidence-preflight \
            --write-artifacts \
            --output benchmarks/production_evidence_preflight_results.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE_PREFLIGHT.md
          python -m wavemind production-evidence-env \
            --write-artifacts \
            --output benchmarks/production_evidence_env_contract.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE_ENV.md \
            --env-output deploy/cluster/production-evidence.env.example
          python -m wavemind production-scale-plan \
            --disk-free-gb 0 \
            --runner-storage-root state/production-runs \
            --write-artifact \
            --output benchmarks/production_scale_run_plan.json \
            --json
          python benchmarks/cost_efficiency_leaderboard.py \
            --output benchmarks/cost_efficiency_results.json \
            --markdown-output benchmarks/COST_EFFICIENCY.md
          python benchmarks/agent_impact_leaderboard.py \
            --output benchmarks/agent_impact_results.json \
            --markdown-output benchmarks/AGENT_IMPACT.md
          python benchmarks/structured_memory_report.py \
            --output benchmarks/structured_memory_results.json \
            --markdown-output benchmarks/STRUCTURED_MEMORY.md
          python benchmarks/memory_os_intelligence_report.py \
            --output benchmarks/memory_os_intelligence_results.json \
            --markdown-output benchmarks/MEMORY_OS_INTELLIGENCE.md
          python benchmarks/cluster_autoscale_report.py \
            --output benchmarks/cluster_autoscale_results.json \
            --markdown-output benchmarks/CLUSTER_AUTOSCALE.md
          python -m wavemind production-evidence-dispatch \
            --write-artifacts \
            --output benchmarks/production_evidence_dispatch_results.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE_DISPATCH.md
          python -m wavemind production-evidence-bundle \
            --write-artifacts \
            --output benchmarks/production_evidence_bundle_results.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE_BUNDLE.md
          python -m wavemind release-claims \
            --write-artifacts \
            --fail-on-blocked \
            --output benchmarks/release_claims_results.json \
            --markdown-output benchmarks/RELEASE_CLAIMS.md
          python -m wavemind scale-gap \
            --write-artifacts \
            --output benchmarks/scale_gap_results.json \
            --markdown-output benchmarks/SCALE_GAP.md
          python benchmarks/strict_evidence_readiness_report.py \
            --output benchmarks/strict_evidence_readiness_results.json \
            --markdown-output benchmarks/STRICT_EVIDENCE_READINESS.md
          python -m wavemind production-admission \
            --target-memories 100000000 \
            --engine qdrant-sharded-service \
            --allow-plan-only \
            --write-artifacts \
            --output benchmarks/production_admission_results.json \
            --markdown-output benchmarks/PRODUCTION_ADMISSION.md \
            --json
          python -m wavemind cluster-admission \
            --allow-plan-only \
            --write-artifacts \
            --output benchmarks/cluster_admission_results.json \
            --markdown-output benchmarks/CLUSTER_ADMISSION.md \
            --json
          python -m wavemind active-active-admission \
            --allow-plan-only \
            --write-artifacts \
            --output benchmarks/active_active_admission_results.json \
            --markdown-output benchmarks/ACTIVE_ACTIVE_ADMISSION.md \
            --json
          python -m wavemind serverless-admission \
            --allow-plan-only \
            --write-artifacts \
            --output benchmarks/serverless_admission_results.json \
            --markdown-output benchmarks/SERVERLESS_ADMISSION.md \
            --json
          python -m wavemind multimodal-admission \
            --allow-plan-only \
            --write-artifacts \
            --output benchmarks/multimodal_admission_results.json \
            --markdown-output benchmarks/MULTIMODAL_ADMISSION.md \
            --json
          python -m wavemind \
            --db .tmp-memory-os-canary.sqlite3 \
            memory-os-canary \
            --target-memories 100000 \
            --namespace-count 64 \
            --deployment staging \
            --write-artifacts \
            --output benchmarks/memory_os_canary_results.json \
            --markdown-output benchmarks/MEMORY_OS_CANARY.md \
            --fail-on-action-required \
            --json
          python -m wavemind memory-os-evolution \
            --cycles 3 \
            --write-artifacts \
            --output benchmarks/memory_os_policy_evolution_results.json \
            --markdown-output benchmarks/MEMORY_OS_POLICY_EVOLUTION.md \
            --fail-on-action-required \
            --json
          python benchmarks/memory_os_runtime_soak.py \
            --redis-url redis://127.0.0.1:6379/0 \
            --rounds 20 \
            --contenders 4 \
            --output benchmarks/memory_os_runtime_soak_results.json \
            --markdown-output benchmarks/MEMORY_OS_RUNTIME_SOAK.md
          python benchmarks/memory_os_remote_worker_soak.py \
            --preflight-only \
            --output benchmarks/memory_os_remote_soak_handoff_results.json \
            --markdown-output benchmarks/MEMORY_OS_REMOTE_SOAK_HANDOFF.md
          python benchmarks/memory_os_quality_gate.py \
            --output benchmarks/memory_os_quality_results.json \
            --markdown-output benchmarks/MEMORY_OS_QUALITY.md
          WAVEMIND_DB=.tmp-memory-os-canary.sqlite3 python -m wavemind memory-os-admission \
            --namespace canary:memory-os \
            --target-memories 50000 \
            --namespace-count 64 \
            --node-count 3 \
            --target-qps 50 \
            --target-p99-ms 100 \
            --deployment production \
            --cache-mode redis \
            --redis-url redis://127.0.0.1:6379/0 \
            --lock-redis-url redis://127.0.0.1:6379/0 \
            --runtime-evidence benchmarks/memory_os_runtime_soak_results.json \
            --quality-evidence benchmarks/memory_os_quality_results.json \
            --allow-plan-only \
            --write-artifacts \
            --output benchmarks/memory_os_admission_results.json \
            --markdown-output benchmarks/MEMORY_OS_ADMISSION.md \
            --json
          python -m wavemind memory-os-policy-bundle \
            --write-artifacts \
            --output benchmarks/memory_os_policy_bundle_results.json \
            --markdown-output benchmarks/MEMORY_OS_POLICY_BUNDLE.md \
            --fail-on-action-required \
            --json
          python benchmarks/benchmark_registry.py \
            --output benchmarks/benchmark_matrix_results.json
          python benchmarks/render_benchmark_report.py
          python benchmarks/render_benchmark_leaderboard.py
          python benchmarks/render_benchmark_charts.py \
            --output docs/assets/benchmark-summary.svg
          python benchmarks/agent_impact_leaderboard.py \
            --output benchmarks/agent_impact_results.json \
            --markdown-output benchmarks/AGENT_IMPACT.md
          python benchmarks/structured_memory_report.py \
            --output benchmarks/structured_memory_results.json \
            --markdown-output benchmarks/STRUCTURED_MEMORY.md
          python benchmarks/memory_os_intelligence_report.py \
            --output benchmarks/memory_os_intelligence_results.json \
            --markdown-output benchmarks/MEMORY_OS_INTELLIGENCE.md
          python benchmarks/cluster_autoscale_report.py \
            --output benchmarks/cluster_autoscale_results.json \
            --markdown-output benchmarks/CLUSTER_AUTOSCALE.md
          python benchmarks/cost_efficiency_leaderboard.py \
            --output benchmarks/cost_efficiency_results.json \
            --markdown-output benchmarks/COST_EFFICIENCY.md
          python benchmarks/render_leaderboard_status.py \
            --output docs/data/leaderboard-status.json
          python benchmarks/validate_benchmark_artifacts.py \
            --max-age-days 8 \
            --output benchmarks/benchmark_artifact_audit.json
          python benchmarks/render_leaderboard_status.py \
            --output docs/data/leaderboard-status.json
          python benchmarks/render_benchmark_dashboard.py \
            --output docs/benchmark-dashboard.html

      - name: Validate benchmark renderers
        run: |
          pytest -q \
            tests/test_benchmark_registry.py \
            tests/test_benchmark_report.py \
            tests/test_benchmark_leaderboard.py \
            tests/test_benchmark_charts.py \
            tests/test_benchmark_dashboard.py \
            tests/test_leaderboard_status.py \
            tests/test_agent_impact_leaderboard.py \
            tests/test_structured_memory_report.py \
            tests/test_memory_os_intelligence_report.py \
            tests/test_memory_os_policy_bundle.py \
            tests/test_memory_os_runtime_soak.py \
            tests/test_memory_os_remote_worker_soak.py \
            tests/test_memory_os_quality_gate.py \
            tests/test_cluster_autoscale_report.py \
            tests/test_cost_efficiency_leaderboard.py \
            tests/test_benchmark_artifact_audit.py \
            tests/test_agent_coherence_benchmark.py \
            tests/test_dynamic_memory_benchmark.py \
            tests/test_field_memory_dynamics_benchmark.py \
            tests/test_serverless_observed_telemetry_benchmark.py \
            tests/test_external_http_cluster_loopback.py \
            tests/test_http_cluster_load_benchmark.py \
            tests/test_external_http_active_active_loopback.py \
            tests/test_local_http_active_active_smoke.py \
            tests/test_scale_readiness_benchmark.py \
            tests/test_production_streaming_load_benchmark.py \
            tests/test_production_readiness_gate.py \
            tests/test_production_evidence_gate.py \
            tests/test_production_evidence_preflight.py \
            tests/test_production_evidence_env.py \
            tests/test_production_evidence_dispatch.py \
            tests/test_production_evidence_bundle.py \
            tests/test_strict_evidence_readiness_report.py

      - name: Report benchmark artifact drift
        run: |
          if git diff --quiet -- benchmarks docs/assets/benchmark-summary.svg docs/benchmark-dashboard.html docs/data/leaderboard-status.json deploy/serverless/observed-telemetry.loopback.json deploy/cluster/production-evidence.env.example; then
            echo "No benchmark changes."
            exit 0
          fi
          echo "::notice::Benchmark artifacts changed. Download the benchmark-leaderboard artifact and commit the reviewed files from a maintainer account."
          git diff --stat -- benchmarks docs/assets/benchmark-summary.svg docs/benchmark-dashboard.html docs/data/leaderboard-status.json deploy/serverless/observed-telemetry.loopback.json deploy/cluster/production-evidence.env.example

      - name: Build GitHub Pages leaderboard
        run: |
          rm -rf site
          mkdir -p site/assets site/benchmarks site/data
          cp docs/benchmark-dashboard.html site/index.html
          cp docs/assets/benchmark-summary.svg site/assets/benchmark-summary.svg
          cp benchmarks/BENCHMARK_LEADERBOARD.md site/benchmarks/BENCHMARK_LEADERBOARD.md
          cp benchmarks/BENCHMARK_REPORT.md site/benchmarks/BENCHMARK_REPORT.md
          cp benchmarks/PRODUCTION_READINESS.md site/benchmarks/PRODUCTION_READINESS.md
          cp benchmarks/PRODUCTION_EVIDENCE.md site/benchmarks/PRODUCTION_EVIDENCE.md
          cp benchmarks/PRODUCTION_EVIDENCE_PREFLIGHT.md site/benchmarks/PRODUCTION_EVIDENCE_PREFLIGHT.md
          cp benchmarks/PRODUCTION_EVIDENCE_ENV.md site/benchmarks/PRODUCTION_EVIDENCE_ENV.md
          cp benchmarks/PRODUCTION_EVIDENCE_DISPATCH.md site/benchmarks/PRODUCTION_EVIDENCE_DISPATCH.md
          cp benchmarks/PRODUCTION_EVIDENCE_BUNDLE.md site/benchmarks/PRODUCTION_EVIDENCE_BUNDLE.md
          cp benchmarks/RELEASE_CLAIMS.md site/benchmarks/RELEASE_CLAIMS.md
          cp benchmarks/SCALE_GAP.md site/benchmarks/SCALE_GAP.md
          cp benchmarks/STRICT_EVIDENCE_READINESS.md site/benchmarks/STRICT_EVIDENCE_READINESS.md
          cp benchmarks/PRODUCTION_ADMISSION.md site/benchmarks/PRODUCTION_ADMISSION.md
          cp benchmarks/ACTIVE_ACTIVE_ADMISSION.md site/benchmarks/ACTIVE_ACTIVE_ADMISSION.md
          cp benchmarks/SERVERLESS_ADMISSION.md site/benchmarks/SERVERLESS_ADMISSION.md
          cp benchmarks/MULTIMODAL_ADMISSION.md site/benchmarks/MULTIMODAL_ADMISSION.md
          cp benchmarks/AGENT_IMPACT.md site/benchmarks/AGENT_IMPACT.md
          cp benchmarks/STRUCTURED_MEMORY.md site/benchmarks/STRUCTURED_MEMORY.md
          cp benchmarks/MEMORY_OS_INTELLIGENCE.md site/benchmarks/MEMORY_OS_INTELLIGENCE.md
          cp benchmarks/CLUSTER_AUTOSCALE.md site/benchmarks/CLUSTER_AUTOSCALE.md
          cp benchmarks/COST_EFFICIENCY.md site/benchmarks/COST_EFFICIENCY.md
          cp benchmarks/MEMORY_OS_CANARY.md site/benchmarks/MEMORY_OS_CANARY.md
          cp benchmarks/MEMORY_OS_ADMISSION.md site/benchmarks/MEMORY_OS_ADMISSION.md
          cp benchmarks/MEMORY_OS_POLICY_BUNDLE.md site/benchmarks/MEMORY_OS_POLICY_BUNDLE.md
          cp benchmarks/MEMORY_OS_QUALITY.md site/benchmarks/MEMORY_OS_QUALITY.md
          cp benchmarks/MEMORY_OS_REMOTE_SOAK_HANDOFF.md site/benchmarks/MEMORY_OS_REMOTE_SOAK_HANDOFF.md
          cp benchmarks/benchmark_matrix_results.json site/data/benchmark_matrix_results.json
          cp benchmarks/benchmark_artifact_audit.json site/data/benchmark_artifact_audit.json
          cp benchmarks/production_readiness_results.json site/data/production_readiness_results.json
          cp benchmarks/production_evidence_results.json site/data/production_evidence_results.json
          cp benchmarks/production_evidence_preflight_results.json site/data/production_evidence_preflight_results.json
          cp benchmarks/production_evidence_env_contract.json site/data/production_evidence_env_contract.json
          cp benchmarks/production_evidence_dispatch_results.json site/data/production_evidence_dispatch_results.json
          cp benchmarks/production_evidence_bundle_results.json site/data/production_evidence_bundle_results.json
          cp benchmarks/release_claims_results.json site/data/release_claims_results.json
          cp benchmarks/scale_gap_results.json site/data/scale_gap_results.json
          cp benchmarks/strict_evidence_readiness_results.json site/data/strict_evidence_readiness_results.json
          cp benchmarks/production_admission_results.json site/data/production_admission_results.json
          cp benchmarks/active_active_admission_results.json site/data/active_active_admission_results.json
          cp benchmarks/serverless_admission_results.json site/data/serverless_admission_results.json
          cp benchmarks/multimodal_admission_results.json site/data/multimodal_admission_results.json
          cp benchmarks/agent_impact_results.json site/data/agent_impact_results.json
          cp benchmarks/structured_memory_results.json site/data/structured_memory_results.json
          cp benchmarks/memory_os_intelligence_results.json site/data/memory_os_intelligence_results.json
          cp benchmarks/cluster_autoscale_results.json site/data/cluster_autoscale_results.json
          cp benchmarks/cost_efficiency_results.json site/data/cost_efficiency_results.json
          cp benchmarks/memory_os_canary_results.json site/data/memory_os_canary_results.json
          cp benchmarks/memory_os_admission_results.json site/data/memory_os_admission_results.json
          cp benchmarks/memory_os_runtime_soak_results.json site/data/memory_os_runtime_soak_results.json
          cp benchmarks/memory_os_agent_quality_results.json site/data/memory_os_agent_quality_results.json
          cp benchmarks/memory_os_ab_results.json site/data/memory_os_ab_results.json
          cp benchmarks/memory_os_policy_bundle_results.json site/data/memory_os_policy_bundle_results.json
          cp benchmarks/memory_os_quality_results.json site/data/memory_os_quality_results.json
          cp benchmarks/memory_os_remote_soak_handoff_results.json site/data/memory_os_remote_soak_handoff_results.json
          cp docs/data/leaderboard-status.json site/data/leaderboard-status.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy living leaderboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-leaderboard
          path: |
            benchmarks/BENCHMARK_LEADERBOARD.md
            benchmarks/BENCHMARK_REPORT.md
            benchmarks/agent_coherence_results.json
            benchmarks/agent_impact_results.json
            benchmarks/AGENT_IMPACT.md
            benchmarks/structured_memory_results.json
            benchmarks/STRUCTURED_MEMORY.md
            benchmarks/memory_os_intelligence_results.json
            benchmarks/MEMORY_OS_INTELLIGENCE.md
            benchmarks/cluster_autoscale_results.json
            benchmarks/CLUSTER_AUTOSCALE.md
            benchmarks/benchmark_artifact_audit.json
            benchmarks/benchmark_matrix_results.json
            benchmarks/dynamic_memory_results.json
            benchmarks/field_memory_dynamics_results.json
            benchmarks/http_cluster_load_results.json
            benchmarks/http_cluster_load_loopback_results.json
            benchmarks/external_http_active_active_loopback_results.json
            benchmarks/local_http_active_active_smoke_results.json
            benchmarks/scale_readiness_results.json
            deploy/serverless/observed-telemetry.loopback.json
            benchmarks/production_streaming_load_smoke_results.json
            benchmarks/production_streaming_load_qdrant_sharded_smoke_results.json
            benchmarks/production_readiness_results.json
            benchmarks/PRODUCTION_READINESS.md
            benchmarks/production_evidence_results.json
            benchmarks/PRODUCTION_EVIDENCE.md
            benchmarks/production_evidence_preflight_results.json
            benchmarks/PRODUCTION_EVIDENCE_PREFLIGHT.md
            benchmarks/production_evidence_env_contract.json
            benchmarks/PRODUCTION_EVIDENCE_ENV.md
            deploy/cluster/production-evidence.env.example
            benchmarks/production_evidence_dispatch_results.json
            benchmarks/PRODUCTION_EVIDENCE_DISPATCH.md
            benchmarks/production_evidence_bundle_results.json
            benchmarks/PRODUCTION_EVIDENCE_BUNDLE.md
            benchmarks/release_claims_results.json
            benchmarks/RELEASE_CLAIMS.md
            benchmarks/scale_gap_results.json
            benchmarks/SCALE_GAP.md
            benchmarks/strict_evidence_readiness_results.json
            benchmarks/STRICT_EVIDENCE_READINESS.md
            benchmarks/production_admission_results.json
            benchmarks/PRODUCTION_ADMISSION.md
            benchmarks/active_active_admission_results.json
            benchmarks/ACTIVE_ACTIVE_ADMISSION.md
            benchmarks/serverless_admission_results.json
            benchmarks/SERVERLESS_ADMISSION.md
            benchmarks/multimodal_admission_results.json
            benchmarks/MULTIMODAL_ADMISSION.md
            benchmarks/cost_efficiency_results.json
            benchmarks/COST_EFFICIENCY.md
            benchmarks/memory_os_canary_results.json
            benchmarks/MEMORY_OS_CANARY.md
            benchmarks/memory_os_admission_results.json
            benchmarks/MEMORY_OS_ADMISSION.md
            benchmarks/memory_os_runtime_soak_results.json
            benchmarks/MEMORY_OS_RUNTIME_SOAK.md
            benchmarks/memory_os_agent_quality_results.json
            benchmarks/memory_os_ab_results.json
            benchmarks/memory_os_quality_results.json
            benchmarks/MEMORY_OS_QUALITY.md
            benchmarks/memory_os_remote_soak_handoff_results.json
            benchmarks/MEMORY_OS_REMOTE_SOAK_HANDOFF.md
            docs/benchmark-dashboard.html
            docs/data/leaderboard-status.json
            docs/assets/benchmark-summary.svg
