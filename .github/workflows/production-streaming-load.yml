name: production-streaming-load

on:
  workflow_dispatch:
    inputs:
      engine:
        description: "Large-N backend to run."
        required: true
        default: "qdrant-sharded-service"
        type: choice
        options:
          - qdrant-service
          - qdrant-sharded-service
          - pgvector-service
          - faiss-ivfpq-persisted
      size:
        description: "Vector count. Use 10000000, 50000000, or 100000000 for strict evidence paths."
        required: true
        default: "10000000"
        type: string
      dim:
        description: "Vector dimension."
        required: true
        default: "128"
        type: string
      queries:
        description: "Query count."
        required: true
        default: "100"
        type: string
      top_k:
        description: "Top-k recall window."
        required: true
        default: "10"
        type: string
      batch_size:
        description: "Generated vector batch size."
        required: true
        default: "100000"
        type: string
      target_recall:
        description: "Required recall@k."
        required: true
        default: "0.95"
        type: string
      target_p99_ms:
        description: "Required p99 latency."
        required: true
        default: "100.0"
        type: string
      target_qps:
        description: "Target query rate for cost/SLO modeling."
        required: true
        default: "100.0"
        type: string
      replicas:
        description: "Replica count for cost/SLO modeling."
        required: true
        default: "3"
        type: string
      autoscaling_max_replicas:
        description: "Max replicas for cost/SLO modeling."
        required: true
        default: "24"
        type: string
      capacity_headroom:
        description: "Capacity headroom used by the SLO/cost gate."
        required: true
        default: "0.7"
        type: string
      runner_label:
        description: "Runner label. Use a self-hosted sized runner for real 10M/50M/100M runs."
        required: true
        default: "ubuntu-latest"
        type: string
      resume_run_id:
        description: "Optional previous workflow run id whose production-streaming-load-state artifact should be downloaded first."
        required: false
        default: ""
        type: string
      qdrant_url:
        description: "Optional Qdrant URL. Falls back to secret WAVEMIND_QDRANT_URL."
        required: false
        default: ""
        type: string
      qdrant_urls:
        description: "Optional comma/newline-separated Qdrant shard URLs. Falls back to secret WAVEMIND_QDRANT_URLS."
        required: false
        default: ""
        type: string
      pgvector_dsn:
        description: "Optional PostgreSQL/pgvector DSN. Falls back to secret WAVEMIND_PGVECTOR_DSN."
        required: false
        default: ""
        type: string
      pgvector_dsns:
        description: "Optional comma/newline-separated pgvector shard DSNs. Falls back to secret WAVEMIND_PGVECTOR_DSNS."
        required: false
        default: ""
        type: string
      provision_pgvector_shards:
        description: "Provision isolated pgvector services on the ephemeral runner when external DSNs are unavailable."
        required: true
        default: false
        type: boolean
      pgvector_shard_count:
        description: "Number of ephemeral pgvector services to provision. Strict 10M evidence requires four."
        required: true
        default: "4"
        type: string
      faiss_ivfpq_path:
        description: "Optional persisted FAISS IVF-PQ path. Defaults under ./state."
        required: false
        default: ""
        type: string
      runner_storage_root:
        description: "Directory or mounted volume for checkpoints and default local index paths."
        required: false
        default: "state"
        type: string
      commit_results:
        description: "Publish result and refreshed evidence on a reviewable benchmark PR."
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  production-streaming-load:
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 340
    env:
      ENGINE: ${{ inputs.engine }}
      SIZE: ${{ inputs.size }}
      DIM: ${{ inputs.dim }}
      QUERIES: ${{ inputs.queries }}
      TOP_K: ${{ inputs.top_k }}
      BATCH_SIZE: ${{ inputs.batch_size }}
      WAVEMIND_FAISS_IVFPQ_NLIST: "4096"
      WAVEMIND_FAISS_IVFPQ_M: "16"
      WAVEMIND_FAISS_IVFPQ_NBITS: "8"
      WAVEMIND_FAISS_IVFPQ_NPROBE: "1024"
      WAVEMIND_FAISS_IVFPQ_NPROBE_SWEEP: "64,128,256,512,1024"
      WAVEMIND_FAISS_IVFPQ_TRAINING_SIZE: "200000"
      WAVEMIND_FAISS_CHECKPOINT_INTERVAL_BATCHES: "5"
      TARGET_RECALL: ${{ inputs.target_recall }}
      TARGET_P99_MS: ${{ inputs.target_p99_ms }}
      TARGET_QPS: ${{ inputs.target_qps }}
      REPLICAS: ${{ inputs.replicas }}
      AUTOSCALING_MAX_REPLICAS: ${{ inputs.autoscaling_max_replicas }}
      CAPACITY_HEADROOM: ${{ inputs.capacity_headroom }}
      RESUME_RUN_ID: ${{ inputs.resume_run_id }}
      INPUT_QDRANT_URL: ${{ inputs.qdrant_url }}
      INPUT_QDRANT_URLS: ${{ inputs.qdrant_urls }}
      INPUT_PGVECTOR_DSN: ${{ inputs.pgvector_dsn }}
      INPUT_PGVECTOR_DSNS: ${{ inputs.pgvector_dsns }}
      PROVISION_PGVECTOR_SHARDS: ${{ inputs.provision_pgvector_shards }}
      PGVECTOR_SHARD_COUNT: ${{ inputs.pgvector_shard_count }}
      INPUT_FAISS_IVFPQ_PATH: ${{ inputs.faiss_ivfpq_path }}
      RUNNER_STORAGE_ROOT: ${{ inputs.runner_storage_root }}
      SECRET_QDRANT_URL: ${{ secrets.WAVEMIND_QDRANT_URL }}
      SECRET_QDRANT_URLS: ${{ secrets.WAVEMIND_QDRANT_URLS }}
      SECRET_PGVECTOR_DSN: ${{ secrets.WAVEMIND_PGVECTOR_DSN }}
      SECRET_PGVECTOR_DSNS: ${{ secrets.WAVEMIND_PGVECTOR_DSNS }}
      SECRET_QDRANT_API_KEY: ${{ secrets.WAVEMIND_QDRANT_API_KEY }}
      SECRET_QDRANT_API_KEYS: ${{ secrets.WAVEMIND_QDRANT_API_KEYS }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,bench,indexes,postgres]"

      - name: Provision isolated pgvector services
        if: ${{ inputs.engine == 'pgvector-service' && inputs.provision_pgvector_shards }}
        run: |
          case "$PGVECTOR_SHARD_COUNT" in
            ''|*[!0-9]*) echo "pgvector_shard_count must be an integer" >&2; exit 1 ;;
          esac
          if [ "$PGVECTOR_SHARD_COUNT" -lt 2 ] || [ "$PGVECTOR_SHARD_COUNT" -gt 8 ]; then
            echo "pgvector_shard_count must be between 2 and 8" >&2
            exit 1
          fi

          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet /opt/hostedtoolcache/CodeQL
          docker network create wavemind-pgvector-ci
          : > pgvector-managed-dsns.txt
          for shard in $(seq 0 $((PGVECTOR_SHARD_COUNT - 1))); do
            name="wavemind-pgvector-${shard}"
            port=$((55432 + shard))
            docker run --detach \
              --name "$name" \
              --network wavemind-pgvector-ci \
              --shm-size 1g \
              --publish "127.0.0.1:${port}:5432" \
              --env POSTGRES_PASSWORD=wavemind-ci \
              --env POSTGRES_DB=wavemind \
              "pgvector/pgvector:pg16" \
              postgres \
              -c shared_buffers=512MB \
              -c maintenance_work_mem=768MB \
              -c effective_cache_size=2GB \
              -c max_parallel_maintenance_workers=1 \
              -c max_wal_size=4GB \
              -c min_wal_size=1GB \
              -c checkpoint_timeout=30min \
              -c checkpoint_completion_target=0.9 \
              -c wal_compression=on
            printf 'postgresql://postgres:wavemind-ci@127.0.0.1:%s/wavemind\n' "$port" \
              >> pgvector-managed-dsns.txt
          done

          for shard in $(seq 0 $((PGVECTOR_SHARD_COUNT - 1))); do
            name="wavemind-pgvector-${shard}"
            for attempt in $(seq 1 90); do
              if docker exec "$name" pg_isready --username postgres --dbname wavemind; then
                break
              fi
              if [ "$attempt" -eq 90 ]; then
                docker logs "$name"
                exit 1
              fi
              sleep 2
            done
          done
          df -h
          free -h

      - name: Restore previous checkpoint artifact
        if: ${{ inputs.resume_run_id != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "$RESUME_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name production-streaming-load-state \
            --dir .

      - name: Run production streaming benchmark
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          engine = os.environ["ENGINE"]
          size = int(os.environ["SIZE"])
          runner_storage_root = Path(os.environ.get("RUNNER_STORAGE_ROOT", "state") or "state")
          runner_storage_root.mkdir(parents=True, exist_ok=True)

          def pick(input_name: str, secret_name: str) -> str:
              return (os.environ.get(input_name) or os.environ.get(secret_name) or "").strip()

          def slug(value: str) -> str:
              return re.sub(r"[^a-z0-9]+", "-", value.lower()).strip("-")

          def result_path(engine_name: str, vector_count: int) -> Path:
              if engine_name == "qdrant-service" and vector_count == 10_000_000:
                  return Path("benchmarks/production_streaming_load_qdrant_10m_results.json")
              if engine_name == "qdrant-sharded-service" and vector_count == 10_000_000:
                  return Path("benchmarks/production_streaming_load_qdrant_sharded_10m_results.json")
              if engine_name == "qdrant-sharded-service" and vector_count == 100_000_000:
                  return Path("benchmarks/production_streaming_load_qdrant_sharded_100m_results.json")
              if engine_name == "pgvector-service" and vector_count == 10_000_000:
                  return Path("benchmarks/production_streaming_load_pgvector_10m_results.json")
              if engine_name == "faiss-ivfpq-persisted" and vector_count == 50_000_000:
                  return Path("benchmarks/production_streaming_load_ivfpq_50m_results.json")
              return Path(f"benchmarks/production_streaming_load_{slug(engine_name)}_{vector_count}_results.json")

          env = os.environ.copy()
          if engine == "qdrant-service":
              value = pick("INPUT_QDRANT_URL", "SECRET_QDRANT_URL")
              if not value:
                  raise SystemExit("qdrant-service requires qdrant_url or secret WAVEMIND_QDRANT_URL")
              env["WAVEMIND_QDRANT_URL"] = value
              api_key = os.environ.get("SECRET_QDRANT_API_KEY", "").strip()
              if api_key:
                  env["WAVEMIND_QDRANT_API_KEY"] = api_key
          elif engine == "qdrant-sharded-service":
              value = pick("INPUT_QDRANT_URLS", "SECRET_QDRANT_URLS")
              if not value:
                  raise SystemExit("qdrant-sharded-service requires qdrant_urls or secret WAVEMIND_QDRANT_URLS")
              env["WAVEMIND_QDRANT_URLS"] = value
              api_key = os.environ.get("SECRET_QDRANT_API_KEY", "").strip()
              api_keys = os.environ.get("SECRET_QDRANT_API_KEYS", "").strip()
              if api_key:
                  env["WAVEMIND_QDRANT_API_KEY"] = api_key
              if api_keys:
                  env["WAVEMIND_QDRANT_API_KEYS"] = api_keys
          elif engine == "pgvector-service":
              shard_values = pick("INPUT_PGVECTOR_DSNS", "SECRET_PGVECTOR_DSNS")
              value = pick("INPUT_PGVECTOR_DSN", "SECRET_PGVECTOR_DSN")
              managed_shards = os.environ.get("PROVISION_PGVECTOR_SHARDS", "").lower() == "true"
              if managed_shards:
                  shard_values = Path("pgvector-managed-dsns.txt").read_text(
                      encoding="utf-8"
                  ).strip()
                  env["WAVEMIND_PGVECTOR_EVIDENCE_TOPOLOGY"] = (
                      "github-hosted-isolated-service-processes"
                  )
              if shard_values:
                  env["WAVEMIND_PGVECTOR_DSNS"] = shard_values
                  env.pop("WAVEMIND_PGVECTOR_DSN", None)
              elif value:
                  env["WAVEMIND_PGVECTOR_DSN"] = value
              else:
                  raise SystemExit(
                      "pgvector-service requires pgvector_dsns/WAVEMIND_PGVECTOR_DSNS "
                      "or pgvector_dsn/WAVEMIND_PGVECTOR_DSN"
                  )
              env.setdefault("WAVEMIND_PGVECTOR_STORAGE_TYPE", "halfvec")
              env.setdefault("WAVEMIND_PGVECTOR_INSERT_MODE", "copy")
              env.setdefault("WAVEMIND_PGVECTOR_INDEX_TYPE", "hnsw")
              env.setdefault("WAVEMIND_PGVECTOR_HNSW_M", "16")
              env.setdefault("WAVEMIND_PGVECTOR_HNSW_EF_CONSTRUCTION", "256")
              env.setdefault("WAVEMIND_PGVECTOR_EF_SEARCH", "800")
              env.setdefault("WAVEMIND_PGVECTOR_QUERY_ROUTING", "namespace")
              env.setdefault("WAVEMIND_PGVECTOR_PREWARM_INDEX", "1")
              if managed_shards:
                  env["WAVEMIND_PGVECTOR_INDEX_BUILD_WORKERS"] = os.environ[
                      "PGVECTOR_SHARD_COUNT"
                  ]
          elif engine == "faiss-ivfpq-persisted":
              value = os.environ.get("INPUT_FAISS_IVFPQ_PATH", "").strip()
              env["WAVEMIND_FAISS_IVFPQ_PATH"] = value or str(runner_storage_root / f"faiss-ivfpq-{size}.faiss")
          else:
              raise SystemExit(f"unsupported engine: {engine}")

          output = result_path(engine, size)
          checkpoint = runner_storage_root / f"{slug(engine)}-{size}.checkpoint.json"
          output.parent.mkdir(parents=True, exist_ok=True)
          checkpoint.parent.mkdir(parents=True, exist_ok=True)

          args = [
              sys.executable,
              "benchmarks/production_streaming_load_benchmark.py",
              "--sizes",
              str(size),
              "--dim",
              os.environ["DIM"],
              "--queries",
              os.environ["QUERIES"],
              "--top-k",
              os.environ["TOP_K"],
              "--batch-size",
              os.environ["BATCH_SIZE"],
              "--engines",
              engine,
              "--target-recall",
              os.environ["TARGET_RECALL"],
              "--target-p99-ms",
              os.environ["TARGET_P99_MS"],
              "--target-qps",
              os.environ["TARGET_QPS"],
              "--replicas",
              os.environ["REPLICAS"],
              "--autoscaling-max-replicas",
              os.environ["AUTOSCALING_MAX_REPLICAS"],
              "--capacity-headroom",
              os.environ["CAPACITY_HEADROOM"],
              "--output",
              str(output),
              "--checkpoint-path",
              str(checkpoint),
          ]
          subprocess.run(args, check=True, env=env)
          Path("production-streaming-output-path.txt").write_text(str(output), encoding="utf-8")
          Path("production-streaming-checkpoint-path.txt").write_text(str(checkpoint), encoding="utf-8")
          Path("production-streaming-runner-storage-root.txt").write_text(str(runner_storage_root), encoding="utf-8")
          PY

      - name: Validate production streaming result
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          output = Path("production-streaming-output-path.txt").read_text(encoding="utf-8").strip()
          payload = json.loads(Path(output).read_text(encoding="utf-8"))
          expected_vectors = int(os.environ["SIZE"])
          expected_engine = {
              "qdrant-service": "Qdrant service streaming",
              "qdrant-sharded-service": "Qdrant sharded service streaming",
              "pgvector-service": "WaveMind pgvector streaming",
              "faiss-ivfpq-persisted": "WaveMind faiss-ivfpq-persisted streaming",
          }[os.environ["ENGINE"]]
          rows = [
              row
              for size_result in payload.get("results", [])
              if int(size_result.get("vectors", 0) or 0) == expected_vectors
              for row in size_result.get("results", [])
              if row.get("engine") == expected_engine
          ]
          if len(rows) != 1:
              raise SystemExit(
                  f"expected exactly one {expected_engine!r} row at {expected_vectors} vectors; "
                  f"found {len(rows)}"
              )
          row = rows[0]
          if row.get("skipped"):
              raise SystemExit(f"production benchmark skipped: {row.get('reason', 'unknown reason')}")
          if int(row.get("vectors", 0) or 0) != expected_vectors:
              raise SystemExit("production benchmark did not ingest the requested vector count")
          if (
              os.environ["ENGINE"] == "pgvector-service"
              and os.environ.get("PROVISION_PGVECTOR_SHARDS", "").lower() == "true"
          ):
              expected_shards = int(os.environ["PGVECTOR_SHARD_COUNT"])
              if int(row.get("shard_count", 0) or 0) != expected_shards:
                  raise SystemExit(
                      f"expected {expected_shards} pgvector shards; "
                      f"found {row.get('shard_count')}"
                  )
              expected_per_shard = expected_vectors // expected_shards
              if row.get("shard_row_counts") != [expected_per_shard] * expected_shards:
                  raise SystemExit(
                      "pgvector shard row counts do not prove an exact balanced layout: "
                      f"{row.get('shard_row_counts')}"
                  )
              if row.get("shard_misplaced_rows") != [0] * expected_shards:
                  raise SystemExit(
                      f"pgvector shards contain misplaced rows: {row.get('shard_misplaced_rows')}"
                  )
              if row.get("query_routing") != "namespace":
                  raise SystemExit("managed pgvector evidence must use namespace routing")
              if int(row.get("index_build_workers", 0) or 0) != expected_shards:
                  raise SystemExit(
                      "managed pgvector evidence must build independent shard indexes in parallel"
                  )
              if row.get("evidence_topology") != "github-hosted-isolated-service-processes":
                  raise SystemExit(
                      "managed pgvector evidence is missing its isolated-service topology attestation"
                  )
          print(
              f"validated {expected_engine}: vectors={row['vectors']} "
              f"recall={row.get('recall_at_k')} p99_ms={row.get('p99_latency_ms')}"
          )
          PY

      - name: Refresh benchmark and evidence reports
        run: |
          python benchmarks/benchmark_registry.py \
            --output benchmarks/benchmark_matrix_results.json
          python benchmarks/render_benchmark_report.py
          python benchmarks/render_benchmark_leaderboard.py
          python benchmarks/render_benchmark_charts.py \
            --output docs/assets/benchmark-summary.svg
          python benchmarks/agent_impact_leaderboard.py \
            --output benchmarks/agent_impact_results.json \
            --markdown-output benchmarks/AGENT_IMPACT.md
          python benchmarks/structured_memory_report.py \
            --output benchmarks/structured_memory_results.json \
            --markdown-output benchmarks/STRUCTURED_MEMORY.md
          python benchmarks/memory_os_intelligence_report.py \
            --output benchmarks/memory_os_intelligence_results.json \
            --markdown-output benchmarks/MEMORY_OS_INTELLIGENCE.md
          python benchmarks/cluster_autoscale_report.py \
            --output benchmarks/cluster_autoscale_results.json \
            --markdown-output benchmarks/CLUSTER_AUTOSCALE.md
          python benchmarks/cost_efficiency_leaderboard.py \
            --output benchmarks/cost_efficiency_results.json \
            --markdown-output benchmarks/COST_EFFICIENCY.md
          python benchmarks/render_leaderboard_status.py \
            --output docs/data/leaderboard-status.json
          python benchmarks/validate_benchmark_artifacts.py \
            --max-age-days 8 \
            --output benchmarks/benchmark_artifact_audit.json
          python benchmarks/production_readiness_gate.py \
            --output benchmarks/production_readiness_results.json \
            --markdown-output benchmarks/PRODUCTION_READINESS.md
          python benchmarks/production_evidence_gate.py \
            --output benchmarks/production_evidence_results.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE.md
          python -m wavemind production-evidence-preflight \
            --write-artifacts \
            --output benchmarks/production_evidence_preflight_results.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE_PREFLIGHT.md
          python -m wavemind production-evidence-dispatch \
            --write-artifacts \
            --output benchmarks/production_evidence_dispatch_results.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE_DISPATCH.md
          python -m wavemind production-evidence-bundle \
            --write-artifacts \
            --output benchmarks/production_evidence_bundle_results.json \
            --markdown-output benchmarks/PRODUCTION_EVIDENCE_BUNDLE.md
          python -m wavemind release-claims \
            --write-artifacts \
            --fail-on-blocked \
            --output benchmarks/release_claims_results.json \
            --markdown-output benchmarks/RELEASE_CLAIMS.md
          python -m wavemind scale-gap \
            --write-artifacts \
            --output benchmarks/scale_gap_results.json \
            --markdown-output benchmarks/SCALE_GAP.md
          python benchmarks/strict_evidence_readiness_report.py \
            --output benchmarks/strict_evidence_readiness_results.json \
            --markdown-output benchmarks/STRICT_EVIDENCE_READINESS.md
          python benchmarks/agent_impact_leaderboard.py \
            --output benchmarks/agent_impact_results.json \
            --markdown-output benchmarks/AGENT_IMPACT.md
          python benchmarks/structured_memory_report.py \
            --output benchmarks/structured_memory_results.json \
            --markdown-output benchmarks/STRUCTURED_MEMORY.md
          python benchmarks/memory_os_intelligence_report.py \
            --output benchmarks/memory_os_intelligence_results.json \
            --markdown-output benchmarks/MEMORY_OS_INTELLIGENCE.md
          python benchmarks/cluster_autoscale_report.py \
            --output benchmarks/cluster_autoscale_results.json \
            --markdown-output benchmarks/CLUSTER_AUTOSCALE.md
          python benchmarks/cost_efficiency_leaderboard.py \
            --output benchmarks/cost_efficiency_results.json \
            --markdown-output benchmarks/COST_EFFICIENCY.md
          python benchmarks/render_leaderboard_status.py \
            --output docs/data/leaderboard-status.json
          python benchmarks/render_benchmark_dashboard.py \
            --output docs/benchmark-dashboard.html

      - name: Publish production streaming result PR
        if: ${{ inputs.commit_results }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- benchmarks docs/assets/benchmark-summary.svg docs/benchmark-dashboard.html docs/data/leaderboard-status.json; then
            echo "No benchmark changes."
            exit 0
          fi
          git config user.name "CaspianG"
          git config user.email "259116618+CaspianG@users.noreply.github.com"
          branch="benchmark/production-streaming-${GITHUB_RUN_ID}"
          git switch -c "$branch"
          git add benchmarks docs/assets/benchmark-summary.svg docs/benchmark-dashboard.html docs/data/leaderboard-status.json
          git commit -m "Refresh production streaming benchmark"
          git push --set-upstream origin "$branch"
          if ! gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$branch" \
              --title "Refresh ${ENGINE} ${SIZE}-vector production evidence" \
              --body "Real production streaming result from [workflow run ${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}). Review the measured recall, p99, cost gate, and refreshed claim boundaries before merging."; then
            echo "::warning::Evidence branch $branch was published, but repository settings prevented github-actions from opening the PR."
          fi

      - name: Capture pgvector service diagnostics
        if: ${{ always() && inputs.engine == 'pgvector-service' && inputs.provision_pgvector_shards }}
        run: |
          mkdir -p state/pgvector-service-diagnostics
          docker stats --no-stream > state/pgvector-service-diagnostics/docker-stats.txt || true
          df -h > state/pgvector-service-diagnostics/disk.txt || true
          free -h > state/pgvector-service-diagnostics/memory.txt || true
          for shard in $(seq 0 $((PGVECTOR_SHARD_COUNT - 1))); do
            docker logs "wavemind-pgvector-${shard}" \
              > "state/pgvector-service-diagnostics/shard-${shard}.log" 2>&1 || true
          done

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: production-streaming-load-state
          path: |
            state/**
            ${{ inputs.runner_storage_root }}/**
            production-streaming-output-path.txt
            production-streaming-checkpoint-path.txt
            production-streaming-runner-storage-root.txt

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: production-streaming-load-results
          path: |
            benchmarks/production_streaming_load_*_results.json
            benchmarks/BENCHMARK_LEADERBOARD.md
            benchmarks/BENCHMARK_REPORT.md
            benchmarks/PRODUCTION_EVIDENCE.md
