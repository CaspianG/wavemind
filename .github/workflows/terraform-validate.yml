name: terraform-validate

on:
  push:
    branches: [main]
    paths:
      - "deploy/cloud/**/*.tf"
      - "deploy/cloud/**/*.tfvars.example"
      - ".github/workflows/terraform-validate.yml"
  pull_request:
    paths:
      - "deploy/cloud/**/*.tf"
      - "deploy/cloud/**/*.tfvars.example"
      - ".github/workflows/terraform-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    name: terraform (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: managed-serverless
            root: deploy/cloud/gcp-managed-serverless
          - name: remote-active-active
            root: deploy/cloud/gcp-remote-active-active
          - name: qdrant-100m
            root: deploy/cloud/gcp-qdrant-100m
    defaults:
      run:
        working-directory: ${{ matrix.root }}

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.3"
          terraform_wrapper: false

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Initialize providers without a backend
        run: terraform init -backend=false -input=false

      - name: Validate configuration
        run: terraform validate -no-color
