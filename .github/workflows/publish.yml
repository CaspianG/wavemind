name: publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate release identity
        shell: bash
        run: |
          PACKAGE_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Validate release claims
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,bench]"
          python benchmarks/validate_benchmark_artifacts.py \
            --max-age-days 8 \
            --output benchmarks/benchmark_artifact_audit_ci.json
          python benchmarks/production_readiness_gate.py \
            --output /tmp/production_readiness_results.json \
            --markdown-output /tmp/PRODUCTION_READINESS.md
          python -m wavemind release-claims \
            --root "$GITHUB_WORKSPACE" \
            --write-artifacts \
            --fail-on-blocked \
            --output /tmp/release_claims_results.json \
            --markdown-output /tmp/RELEASE_CLAIMS.md

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
