name: full-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -q

  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run demo and CLI smoke
        run: |
          python examples/demo.py
          wavemind --db /tmp/wavemind-smoke.sqlite3 remember "Andrey is testing WaveMind in CI" --namespace ci
          wavemind --db /tmp/wavemind-smoke.sqlite3 query "testing CI" --namespace ci
          wavemind --db /tmp/wavemind-smoke.sqlite3 stats --namespace ci
          wavemind operator-sample --name wavemind-ci --namespace wavemind-system --replicas 3 --replication-factor 2 --namespace-count 4 --autoscaling --autoscaling-max-replicas 12 --out /tmp/wavemindcluster.json
          python -m json.tool /tmp/wavemindcluster.json >/dev/null
          wavemind operator-reconcile --file /tmp/wavemindcluster.json --out /tmp/wavemind-resources.json
          grep -q '"kind": "StatefulSet"' /tmp/wavemind-resources.json
          grep -q '"kind": "CronJob"' /tmp/wavemind-resources.json
          grep -q '"kind": "HorizontalPodAutoscaler"' /tmp/wavemind-resources.json
          wavemind operator-bundle --namespace wavemind-system --out /tmp/wavemind-operator-bundle.json
          grep -q '"kind": "CustomResourceDefinition"' /tmp/wavemind-operator-bundle.json

  benchmarks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,bench]"

      - name: Run WaveMind vs Chroma agent benchmark
        run: |
          python benchmarks/agent_memory_benchmark.py \
            --engines wavemind chroma \
            --facts 200 \
            --queries 50 \
            --output benchmarks/agent_memory_ci_results.json

      - name: Run dynamic memory benchmark
        run: |
          python benchmarks/dynamic_memory_benchmark.py \
            --engines wavemind chroma \
            --memories 200 \
            --output benchmarks/dynamic_memory_ci_results.json

      - uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: |
            benchmarks/agent_memory_ci_results.json
            benchmarks/dynamic_memory_ci_results.json

  benchmark-artifact-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install benchmark gate dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,bench]"

      - name: Block stale or unsynchronized public benchmark artifacts
        run: |
          python benchmarks/validate_benchmark_artifacts.py \
            --max-age-days 8 \
            --output benchmarks/benchmark_artifact_audit_ci.json
          python benchmarks/production_readiness_gate.py \
            --output /tmp/production_readiness_results.json \
            --markdown-output /tmp/PRODUCTION_READINESS.md

  redis-api-load:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Redis benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,redis]"

      - name: Run real Redis multi-process API load profile
        run: |
          python benchmarks/redis_api_load_benchmark.py \
            --redis-url redis://127.0.0.1:6379/0 \
            --workers 2 \
            --requests 40 \
            --output benchmarks/redis_api_load_ci_results.json \
            --fail-on-slo \
            --min-success-rate 1.0 \
            --max-p99-ms 1000

      - uses: actions/upload-artifact@v7
        with:
          name: redis-api-load-results
          path: benchmarks/redis_api_load_ci_results.json

  local-http-cluster-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run real local multi-node HTTP cluster smoke
        run: |
          python benchmarks/local_http_cluster_smoke.py \
            --nodes 4 \
            --replication-factor 3 \
            --namespace-count 4 \
            --memories-per-namespace 2 \
            --workers 4 \
            --timeout 3 \
            --read-fanout 1 \
            --fail-on-slo \
            --output benchmarks/local_http_cluster_smoke_ci_results.json

      - uses: actions/upload-artifact@v7
        with:
          name: local-http-cluster-smoke-results
          path: benchmarks/local_http_cluster_smoke_ci_results.json

  local-http-active-active-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run real local active-active HTTP service-region smoke
        run: |
          python benchmarks/local_http_active_active_smoke.py \
            --regions 3 \
            --replicas-per-region 3 \
            --namespace-count 2 \
            --timeout 3 \
            --fail-on-slo \
            --output benchmarks/local_http_active_active_smoke_ci_results.json

      - uses: actions/upload-artifact@v7
        with:
          name: local-http-active-active-smoke-results
          path: benchmarks/local_http_active_active_smoke_ci_results.json

  qdrant-sharded-streaming-smoke:
    runs-on: ubuntu-latest
    services:
      qdrant-0:
        image: qdrant/qdrant:v1.15.1
        ports:
          - 6333:6333
      qdrant-1:
        image: qdrant/qdrant:v1.15.1
        ports:
          - 6334:6333

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Qdrant benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,bench]"

      - name: Wait for Qdrant shards
        run: |
          python - <<'PY'
          import time
          import urllib.request

          for port in (6333, 6334):
              url = f"http://127.0.0.1:{port}/readyz"
              deadline = time.time() + 90
              while True:
                  try:
                      with urllib.request.urlopen(url, timeout=2) as response:
                          if response.status == 200:
                              break
                  except Exception:
                      if time.time() >= deadline:
                          raise
                      time.sleep(1)
          PY

      - name: Run real sharded Qdrant streaming smoke
        env:
          WAVEMIND_QDRANT_URLS: http://127.0.0.1:6333,http://127.0.0.1:6334
          WAVEMIND_QDRANT_COLLECTION_PREFIX: wavemind_sharded_ci
          WAVEMIND_QDRANT_UPSERT_BATCH_SIZE: "500"
          WAVEMIND_QDRANT_FANOUT_WORKERS: "2"
          WAVEMIND_QDRANT_WAIT_AFTER_BUILD_SECONDS: "2"
          WAVEMIND_QDRANT_WARMUP_QUERIES: "10"
        run: |
          python benchmarks/production_streaming_load_benchmark.py \
            --sizes 5000 \
            --dim 64 \
            --queries 20 \
            --top-k 10 \
            --batch-size 1000 \
            --engines qdrant-sharded-service \
            --output benchmarks/production_streaming_load_qdrant_sharded_ci_results.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("benchmarks/production_streaming_load_qdrant_sharded_ci_results.json").read_text())
          result = payload["results"][0]["results"][0]
          if result["target_recall_at_k"] < 0.95 or result["p99_latency_ms"] > 100 or result["slo_status"] != "pass":
              raise SystemExit(f"sharded Qdrant smoke SLO failed: {result}")
          PY

      - uses: actions/upload-artifact@v7
        with:
          name: qdrant-sharded-streaming-smoke-results
          path: benchmarks/production_streaming_load_qdrant_sharded_ci_results.json

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t wavemind-ci .

      - name: Run Docker API smoke
        run: |
          docker run -d --name wavemind-ci -p 8000:8000 wavemind-ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/stats >/tmp/wavemind-stats.json; then
              break
            fi
            sleep 1
          done
          cat /tmp/wavemind-stats.json
          curl -fsS -X POST http://127.0.0.1:8000/remember \
            -H "Content-Type: application/json" \
            -d '{"text":"Andrey is testing WaveMind Docker API","namespace":"ci"}'
          curl -fsS -X POST http://127.0.0.1:8000/query \
            -H "Content-Type: application/json" \
            -d '{"query":"Docker API","namespace":"ci","top_k":1}' \
            | tee /tmp/wavemind-query.json
          grep -q "Docker API" /tmp/wavemind-query.json

  helm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint Helm chart
        run: helm lint deploy/helm/wavemind

      - name: Render Helm chart
        run: |
          helm template wavemind deploy/helm/wavemind \
            --set image.repository=ghcr.io/caspiang/wavemind \
            --set image.tag=ci \
            --set auth.enabled=true \
            --set auth.adminKey=test-key \
            --set repair.namespaceCount=4 \
            --set autoscaling.enabled=true \
            --set autoscaling.maxReplicas=12 \
            > /tmp/wavemind-chart.yaml
          grep -q "kind: StatefulSet" /tmp/wavemind-chart.yaml
          grep -q "kind: CronJob" /tmp/wavemind-chart.yaml
          grep -q "kind: HorizontalPodAutoscaler" /tmp/wavemind-chart.yaml
          grep -q "cluster-repair" /tmp/wavemind-chart.yaml
          grep -q "ghcr.io/caspiang/wavemind:ci" /tmp/wavemind-chart.yaml
