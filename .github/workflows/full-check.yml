name: full-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -q

  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run demo and CLI smoke
        run: |
          python examples/demo.py
          wavemind --db /tmp/wavemind-smoke.sqlite3 remember "Andrey is testing WaveMind in CI" --namespace ci
          wavemind --db /tmp/wavemind-smoke.sqlite3 query "testing CI" --namespace ci
          wavemind --db /tmp/wavemind-smoke.sqlite3 stats --namespace ci
          wavemind operator-sample --name wavemind-ci --namespace wavemind-system --replicas 3 --replication-factor 2 --namespace-count 4 --autoscaling --autoscaling-max-replicas 12 --out /tmp/wavemindcluster.json
          python -m json.tool /tmp/wavemindcluster.json >/dev/null
          wavemind operator-reconcile --file /tmp/wavemindcluster.json --out /tmp/wavemind-resources.json
          grep -q '"kind": "StatefulSet"' /tmp/wavemind-resources.json
          grep -q '"kind": "CronJob"' /tmp/wavemind-resources.json
          grep -q '"kind": "HorizontalPodAutoscaler"' /tmp/wavemind-resources.json
          wavemind operator-bundle --namespace wavemind-system --out /tmp/wavemind-operator-bundle.json
          grep -q '"kind": "CustomResourceDefinition"' /tmp/wavemind-operator-bundle.json

  benchmarks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,bench]"

      - name: Run WaveMind vs Chroma agent benchmark
        run: |
          python benchmarks/agent_memory_benchmark.py \
            --engines wavemind chroma \
            --facts 200 \
            --queries 50 \
            --output benchmarks/agent_memory_ci_results.json

      - name: Run dynamic memory benchmark
        run: |
          python benchmarks/dynamic_memory_benchmark.py \
            --engines wavemind chroma \
            --memories 200 \
            --output benchmarks/dynamic_memory_ci_results.json

      - uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: |
            benchmarks/agent_memory_ci_results.json
            benchmarks/dynamic_memory_ci_results.json

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t wavemind-ci .

      - name: Run Docker API smoke
        run: |
          docker run -d --name wavemind-ci -p 8000:8000 wavemind-ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/stats >/tmp/wavemind-stats.json; then
              break
            fi
            sleep 1
          done
          cat /tmp/wavemind-stats.json
          curl -fsS -X POST http://127.0.0.1:8000/remember \
            -H "Content-Type: application/json" \
            -d '{"text":"Andrey is testing WaveMind Docker API","namespace":"ci"}'
          curl -fsS -X POST http://127.0.0.1:8000/query \
            -H "Content-Type: application/json" \
            -d '{"query":"Docker API","namespace":"ci","top_k":1}' \
            | tee /tmp/wavemind-query.json
          grep -q "Docker API" /tmp/wavemind-query.json

  helm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint Helm chart
        run: helm lint deploy/helm/wavemind

      - name: Render Helm chart
        run: |
          helm template wavemind deploy/helm/wavemind \
            --set image.repository=ghcr.io/caspiang/wavemind \
            --set image.tag=ci \
            --set auth.enabled=true \
            --set auth.adminKey=test-key \
            --set repair.namespaceCount=4 \
            --set autoscaling.enabled=true \
            --set autoscaling.maxReplicas=12 \
            > /tmp/wavemind-chart.yaml
          grep -q "kind: StatefulSet" /tmp/wavemind-chart.yaml
          grep -q "kind: CronJob" /tmp/wavemind-chart.yaml
          grep -q "kind: HorizontalPodAutoscaler" /tmp/wavemind-chart.yaml
          grep -q "cluster-repair" /tmp/wavemind-chart.yaml
          grep -q "ghcr.io/caspiang/wavemind:ci" /tmp/wavemind-chart.yaml
