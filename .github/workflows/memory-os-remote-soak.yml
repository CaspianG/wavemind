name: Memory OS remote worker soak

on:
  workflow_dispatch:
    inputs:
      cycles:
        description: Worker cycles (production admission requires at least 500)
        required: true
        default: "500"
      contenders:
        description: Concurrent requests per round
        required: true
        default: "4"

permissions:
  contents: read

concurrency:
  group: memory-os-remote-soak
  cancel-in-progress: false

jobs:
  remote-soak:
    # GitHub-hosted jobs stop after six hours, before a six-hour soak can upload evidence.
    runs-on: [self-hosted, linux, wavemind-evidence]
    timeout-minutes: 480
    env:
      WAVEMIND_REMOTE_WORKER_URLS: ${{ secrets.WAVEMIND_REMOTE_WORKER_URLS }}
      WAVEMIND_REMOTE_REDIS_URL: ${{ secrets.WAVEMIND_REMOTE_REDIS_URL }}
      WAVEMIND_API_KEY: ${{ secrets.WAVEMIND_API_KEY }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install evidence runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[redis]"

      - name: Validate remote evidence inputs
        run: |
          python benchmarks/memory_os_remote_worker_soak.py \
            --preflight-only \
            --fail-on-action-required \
            --output evidence/memory_os_remote_worker_preflight.json \
            --markdown-output evidence/MEMORY_OS_REMOTE_WORKER_PREFLIGHT.md

      - name: Prove direct Memory OS uplift and latency safety
        run: |
          python benchmarks/memory_os_ab_benchmark.py \
            --output evidence/memory_os_ab_results.json
          python benchmarks/memory_os_quality_gate.py \
            --agent evidence/memory_os_ab_results.json \
            --output evidence/memory_os_quality_results.json \
            --markdown-output evidence/MEMORY_OS_QUALITY.md

      - name: Run remote Redis and multi-worker soak
        run: |
          python benchmarks/memory_os_remote_worker_soak.py \
            --cycles "${{ inputs.cycles }}" \
            --min-worker-cycles 500 \
            --min-duration-seconds 21600 \
            --contenders "${{ inputs.contenders }}" \
            --fail-on-action-required \
            --output evidence/memory_os_remote_worker_soak_results.json \
            --markdown-output evidence/MEMORY_OS_REMOTE_WORKER_SOAK.md \
            --admission-output evidence/memory_os_admission_results.json \
            --admission-markdown-output evidence/MEMORY_OS_ADMISSION.md \
            --quality-evidence evidence/memory_os_quality_results.json

      - name: Verify production admission
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("evidence/memory_os_admission_results.json").read_text())
          if payload.get("status") != "admitted" or not payload.get("admitted"):
              raise SystemExit(f"Memory OS admission blocked: {payload.get('summary', {}).get('blocker_ids')}")
          print("Memory OS production admission passed.")
          PY

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-os-remote-worker-evidence-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: 90
