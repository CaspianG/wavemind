name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate benchmark freshness gate
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,bench]"
          python benchmarks/validate_benchmark_artifacts.py \
            --max-age-days 8 \
            --output benchmarks/benchmark_artifact_audit_ci.json
          python benchmarks/production_readiness_gate.py \
            --output /tmp/production_readiness_results.json \
            --markdown-output /tmp/PRODUCTION_READINESS.md
          python -m wavemind production-evidence-dispatch \
            --root "$GITHUB_WORKSPACE" \
            --write-artifacts \
            --output /tmp/production_evidence_dispatch_results.json \
            --markdown-output /tmp/PRODUCTION_EVIDENCE_DISPATCH.md
          python -m wavemind production-evidence-bundle \
            --root "$GITHUB_WORKSPACE" \
            --write-artifacts \
            --output /tmp/production_evidence_bundle_results.json \
            --markdown-output /tmp/PRODUCTION_EVIDENCE_BUNDLE.md
          python -m wavemind release-claims \
            --root "$GITHUB_WORKSPACE" \
            --write-artifacts \
            --fail-on-blocked \
            --output /tmp/release_claims_results.json \
            --markdown-output /tmp/RELEASE_CLAIMS.md
          python -m wavemind scale-gap \
            --root "$GITHUB_WORKSPACE" \
            --write-artifacts \
            --output /tmp/scale_gap_results.json \
            --markdown-output /tmp/SCALE_GAP.md

      - name: Build and verify package
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            /tmp/release_claims_results.json
            /tmp/RELEASE_CLAIMS.md
            /tmp/scale_gap_results.json
            /tmp/SCALE_GAP.md
            /tmp/production_evidence_dispatch_results.json
            /tmp/PRODUCTION_EVIDENCE_DISPATCH.md
            /tmp/production_evidence_bundle_results.json
            /tmp/PRODUCTION_EVIDENCE_BUNDLE.md
