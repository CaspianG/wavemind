name: kubernetes-operator-smoke

on:
  push:
    branches: [main]
    paths:
      - "wavemind/k8s_operator.py"
      - "wavemind/cli.py"
      - "Dockerfile"
      - "deploy/kind/**"
      - "deploy/operator/**"
      - "benchmarks/kubernetes_operator_smoke.py"
      - "benchmarks/kubernetes_cluster_network_smoke.py"
      - "benchmarks/kubernetes_active_active_region_smoke.py"
      - "benchmarks/kubernetes_serverless_lifecycle_smoke.py"
      - "wavemind/cluster_drill.py"
      - "wavemind/active_active_drill.py"
      - "wavemind/serverless.py"
      - "wavemind/indexes.py"
      - "wavemind/core.py"
      - "wavemind/api.py"
      - "tests/test_k8s_operator.py"
      - "tests/test_kubernetes_operator_smoke.py"
      - "tests/test_cluster_drill.py"
      - "tests/test_kubernetes_cluster_network_smoke.py"
      - "tests/test_active_active_drill.py"
      - "tests/test_kubernetes_active_active_region_smoke.py"
      - "tests/test_kubernetes_serverless_lifecycle_smoke.py"
      - "tests/test_serverless.py"
      - "tests/test_indexes_encoders.py"
      - "tests/test_core_persistence.py"
      - ".github/workflows/kubernetes-operator-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  operator-failover:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KIND_VERSION: v0.31.0
      KIND_SHA256: eb244cbafcc157dff60cf68693c14c9a75c4e6e6fedaf9cd71c58117cb93e3fa
      KIND_NODE_IMAGE: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f
      CLUSTER_NAME: wavemind-ci
      NAMESPACE: wavemind-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.35.0

      - name: Install WaveMind and kind
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          curl --fail --location --silent --show-error \
            -o kind "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64"
          echo "${KIND_SHA256}  kind" | sha256sum --check --status
          sudo install -m 0755 kind /usr/local/bin/kind
          kind version
          kubectl version --client

      - name: Create four-node Kubernetes cluster
        run: |
          kind create cluster \
            --name "$CLUSTER_NAME" \
            --config deploy/kind/operator-smoke.yaml \
            --image "$KIND_NODE_IMAGE" \
            --wait 180s
          kubectl get nodes -o wide

      - name: Build and load WaveMind image
        run: |
          docker build --build-arg INSTALL_PRODUCTION=true --tag wavemind:ci .
          docker tag wavemind:ci wavemind:ci-upgrade
          docker pull postgres:16-alpine
          docker pull qdrant/qdrant:v1.15.1
          docker pull redis:7-alpine
          kind load docker-image \
            wavemind:ci \
            wavemind:ci-upgrade \
            postgres:16-alpine \
            qdrant/qdrant:v1.15.1 \
            redis:7-alpine \
            --name "$CLUSTER_NAME"

      - name: Install redundant WaveMind operator
        run: |
          python -m wavemind.cli operator-bundle \
            --namespace "$NAMESPACE" \
            --operator-image wavemind:ci \
            --operator-replicas 2 \
            --operator-interval-seconds 5 \
            --lease-duration-seconds 15 \
            --sample-name wavemind-ci \
            --sample-image wavemind:ci \
            --sample-index numpy \
            --sample-replicas 3 \
            --sample-replication-factor 2 \
            --sample-namespace-count 32 \
            --out /tmp/wavemind-operator-bundle.json
          python - <<'PY'
          import json
          from pathlib import Path

          bundle = json.loads(Path("/tmp/wavemind-operator-bundle.json").read_text())
          cluster = next(item for item in bundle["items"] if item["kind"] == "WaveMindCluster")
          bootstrap = {
              "apiVersion": "v1",
              "kind": "List",
              "items": [item for item in bundle["items"] if item["kind"] != "WaveMindCluster"],
          }
          Path("/tmp/wavemind-operator-bootstrap.json").write_text(json.dumps(bootstrap))
          Path("/tmp/wavemind-cluster.json").write_text(json.dumps(cluster))
          PY
          kubectl create namespace "$NAMESPACE"
          kubectl apply -f /tmp/wavemind-operator-bootstrap.json
          kubectl wait --for=condition=Established \
            crd/wavemindclusters.memory.wavemind.ai --timeout=120s
          kubectl apply -f /tmp/wavemind-cluster.json

      - name: Run Kubernetes leader and pod failure drill
        run: |
          python benchmarks/kubernetes_operator_smoke.py \
            --namespace "$NAMESPACE" \
            --cluster-name wavemind-ci \
            --upgrade-image wavemind:ci-upgrade \
            --timeout-seconds 240 \
            --output benchmarks/kubernetes_operator_smoke_ci_results.json

      - name: Run Kubernetes service-network and physical worker failure drill
        run: |
          python benchmarks/kubernetes_cluster_network_smoke.py \
            --namespace "$NAMESPACE" \
            --cluster-name wavemind-ci \
            --namespace-count 32 \
            --memories-per-namespace 8 \
            --request-timeout 5 \
            --timeout-seconds 240 \
            --output benchmarks/kubernetes_cluster_network_smoke_ci_results.json

      - name: Run Kubernetes active-active region failure drill
        run: |
          python benchmarks/kubernetes_active_active_region_smoke.py \
            --namespace wavemind-regions \
            --image wavemind:ci-upgrade \
            --namespace-count 16 \
            --request-timeout 5 \
            --timeout-seconds 300 \
            --output benchmarks/kubernetes_active_active_region_smoke_ci_results.json

      - name: Free previous drill workloads
        run: |
          kubectl delete namespace "$NAMESPACE" --wait=true --timeout=180s
          kubectl delete namespace wavemind-regions --wait=true --timeout=180s

      - name: Run Kubernetes serverless lifecycle drill
        run: |
          python benchmarks/kubernetes_serverless_lifecycle_smoke.py \
            --namespace wavemind-serverless \
            --image wavemind:ci-upgrade \
            --postgres-image postgres:16-alpine \
            --qdrant-image qdrant/qdrant:v1.15.1 \
            --redis-image redis:7-alpine \
            --memories 24 \
            --burst-requests 120 \
            --burst-workers 8 \
            --timeout-seconds 300 \
            --output benchmarks/kubernetes_serverless_lifecycle_smoke_ci_results.json

      - name: Run Kubernetes PostgreSQL and Qdrant disaster-recovery drill
        run: |
          python benchmarks/kubernetes_postgres_qdrant_dr_smoke.py \
            --source-namespace wavemind-serverless \
            --recovery-namespace wavemind-serverless-dr \
            --image wavemind:ci-upgrade \
            --postgres-image postgres:16-alpine \
            --qdrant-image qdrant/qdrant:v1.15.1 \
            --redis-image redis:7-alpine \
            --memories 24 \
            --timeout-seconds 300 \
            --output benchmarks/kubernetes_postgres_qdrant_dr_smoke_ci_results.json

      - name: Capture diagnostics
        if: always()
        run: |
          kubectl get nodes,pods,statefulsets,deployments,leases,wavemindclusters \
            -A -o wide || true
          kubectl describe deployment/wavemind-operator -n "$NAMESPACE" || true
          kubectl describe pods -n "$NAMESPACE" \
            -l app.kubernetes.io/name=wavemind-operator || true
          kubectl logs deployment/wavemind-operator -n "$NAMESPACE" \
            --all-pods=true --prefix=true --tail=300 || true
          kubectl get pods,deployments,statefulsets,services,endpoints,pvc \
            -n wavemind-serverless -o wide || true
          kubectl describe pods -n wavemind-serverless || true
          kubectl logs deployment/wavemind-serverless-keda \
            -n wavemind-serverless --all-pods=true --prefix=true --tail=300 || true
          kubectl logs statefulset/postgres -n wavemind-serverless --tail=200 || true
          kubectl logs statefulset/qdrant -n wavemind-serverless --tail=200 || true
          kubectl logs statefulset/redis -n wavemind-serverless --tail=200 || true
          kubectl get pods,deployments,statefulsets,services,endpoints,pvc \
            -n wavemind-serverless-dr -o wide || true
          kubectl describe pods -n wavemind-serverless-dr || true
          kubectl logs deployment/wavemind-serverless-keda \
            -n wavemind-serverless-dr --all-pods=true --prefix=true --tail=300 || true
          kubectl logs statefulset/postgres -n wavemind-serverless-dr --tail=200 || true
          kubectl logs statefulset/qdrant -n wavemind-serverless-dr --tail=200 || true
          docker ps -a --format 'table {{.Names}}\t{{.Status}}' || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kubernetes-operator-smoke
          path: |
            benchmarks/kubernetes_operator_smoke_ci_results.json
            benchmarks/kubernetes_cluster_network_smoke_ci_results.json
            benchmarks/kubernetes_active_active_region_smoke_ci_results.json
            benchmarks/kubernetes_serverless_lifecycle_smoke_ci_results.json
            benchmarks/kubernetes_postgres_qdrant_dr_smoke_ci_results.json
          if-no-files-found: warn

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name "$CLUSTER_NAME"
