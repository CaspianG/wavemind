apiVersion: v1
kind: Service
metadata:
  name: {{ include "wavemind.headlessServiceName" . }}
  labels:
    {{- include "wavemind.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "wavemind.selectorLabels" . | nindent 4 }}

