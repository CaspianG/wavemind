{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wavemind.authSecretName" . }}
  labels:
    {{- include "wavemind.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.adminKeyKey }}: {{ required "auth.adminKey is required when auth.enabled=true and auth.existingSecret is empty" .Values.auth.adminKey | quote }}
{{- end }}

