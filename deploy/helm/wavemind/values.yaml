replicaCount: 3
replicationFactor: 2

image:
  repository: ghcr.io/caspiang/wavemind
  tag: "2.4.26"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8000

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 20Gi

auth:
  enabled: false
  existingSecret: ""
  adminKey: ""
  adminKeyKey: admin-key

runtime:
  encoder: hash
  index: numpy
  scoreThreshold: "0.05"
  logLevel: INFO
  auditQueries: "1"
  recoveryJournal: /data/wavemind.recovery.jsonl
  cacheCapacity: "512"
  cacheTtlSeconds: "60"
  redisUrl: ""

otel:
  enabled: false
  exporter: otlp
  endpoint: ""

repair:
  enabled: true
  schedule: "*/15 * * * *"
  namespacePrefix: tenant
  namespaceCount: 1
  namespaces: []
  readQuorum: 1
  writeQuorum: null
  limit: 1000
  includeExpired: false
  tags: []
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid

memoryOs:
  enabled: false
  schedule: "*/10 * * * *"
  namespace: ""
  auditLimit: 512
  maxHotQueries: 32
  minFrequency: 2
  topK: 3
  targetMemories: 2000000
  namespaceCount: 4096
  deployment: production
  cacheMode: auto
  targetQps: 100
  targetP99Ms: 100
  observedP99Ms: null
  multimodal: false
  strictPlan: true
  lockRequired: false
  lockTtlSeconds: 300
  lockPrefix: wavemind:memory-os:lock
  runOnAllReplicas: true
  timeoutSeconds: 30
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: null

resources: {}

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}
