<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">WaveMind dynamic memory</title>
  <desc id="desc">A diagram showing SQLite source of truth, vector candidates, dynamic memory state, and scoped recall.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#172033"/>
      <stop offset="1" stop-color="#12323f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="0" fill="url(#bg)"/>
  <rect x="54" y="54" width="1092" height="522" rx="26" fill="#0f172a" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>

  <text x="92" y="128" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="58" font-weight="800" fill="#f8fafc">WaveMind</text>
  <text x="96" y="174" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">Dynamic memory for software that needs to remember what still matters.</text>

  <rect x="92" y="218" width="232" height="96" rx="18" fill="#18253b" stroke="#3b82f6" stroke-width="2"/>
  <text x="122" y="258" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="700" fill="#eff6ff">Source of truth</text>
  <text x="122" y="290" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" fill="#bfdbfe">SQLite / Postgres</text>

  <path d="M342 266 C388 232 424 232 470 266" fill="none" stroke="#64748b" stroke-width="4"/>
  <path d="M459 252 L478 266 L459 280" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="492" y="218" width="232" height="96" rx="18" fill="#152b2d" stroke="#22c55e" stroke-width="2"/>
  <text x="522" y="258" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="700" fill="#ecfdf5">Candidates</text>
  <text x="522" y="290" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" fill="#bbf7d0">FAISS / Qdrant / pgvector</text>

  <path d="M742 266 C788 232 824 232 870 266" fill="none" stroke="#64748b" stroke-width="4"/>
  <path d="M859 252 L878 266 L859 280" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="892" y="218" width="216" height="96" rx="18" fill="#312217" stroke="#f59e0b" stroke-width="2"/>
  <text x="922" y="258" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="700" fill="#fff7ed">Scoped recall</text>
  <text x="922" y="290" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" fill="#fed7aa">Small useful context</text>

  <rect x="92" y="368" width="1016" height="130" rx="22" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="124" y="418" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="800" fill="#f8fafc">Wave-field memory state</text>
  <text x="124" y="462" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#dbeafe">hotness</text>
  <circle cx="232" cy="455" r="7" fill="#38bdf8"/>
  <text x="258" y="462" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#dcfce7">decay</text>
  <circle cx="338" cy="455" r="7" fill="#22c55e"/>
  <text x="364" y="462" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#fef3c7">TTL</text>
  <circle cx="422" cy="455" r="7" fill="#f59e0b"/>
  <text x="448" y="462" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#ede9fe">priority</text>
  <circle cx="548" cy="455" r="7" fill="#a78bfa"/>
  <text x="574" y="462" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#cffafe">namespaces</text>
  <circle cx="728" cy="455" r="7" fill="#06b6d4"/>
  <text x="754" y="462" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#fecdd3">corrections</text>
  <circle cx="900" cy="455" r="7" fill="#fb7185"/>
  <text x="926" y="462" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#e2e8f0">audit</text>

  <rect x="92" y="530" width="1016" height="6" rx="3" fill="url(#accent)"/>
  <text x="92" y="558" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" fill="#94a3b8">MIT licensed. Python API, CLI, FastAPI, benchmarks, local-first storage.</text>
</svg>
