<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">WaveMind dynamic memory field</title>
  <desc id="desc">A product diagram showing text signals stored in SQLite, retrieved by a vector index, re-ranked by a wave-field memory state, and returned as useful scoped recall.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="0.48" stop-color="#081827"/>
      <stop offset="1" stop-color="#092517"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.58" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="signalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#153448"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#134e4a"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172554"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#422006"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.45" stop-color="#34d399"/>
      <stop offset="0.72" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="fieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .label { font-size: 16px; font-weight: 800; letter-spacing: 0.4px; text-transform: uppercase; }
      .body { font-size: 16px; fill: #cbd5e1; }
      .small { font-size: 13px; fill: #94a3b8; }
      .tiny { font-size: 12px; fill: #a7b4c7; }
      .panel { stroke: #334155; stroke-width: 1.4; filter: url(#softShadow); }
      .chip { fill: #0b1220; stroke: #334155; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.18">
    <path d="M0 118 H1200 M0 236 H1200 M0 354 H1200 M0 472 H1200" stroke="#64748b" stroke-width="1"/>
    <path d="M120 0 V630 M240 0 V630 M360 0 V630 M480 0 V630 M600 0 V630 M720 0 V630 M840 0 V630 M960 0 V630 M1080 0 V630" stroke="#64748b" stroke-width="1"/>
  </g>

  <rect x="34" y="28" width="1132" height="574" rx="28" fill="#07111f" fill-opacity="0.78" stroke="#1e293b" stroke-width="2"/>

  <g class="font">
    <text x="70" y="91" font-size="58" font-weight="900" fill="url(#titleGrad)">WaveMind</text>
    <text x="72" y="129" font-size="22" fill="#dbeafe">Dynamic memory for software that needs to remember what still matters.</text>

    <g transform="translate(814 61)">
      <rect class="chip" x="0" y="0" width="96" height="34" rx="17"/>
      <circle cx="19" cy="17" r="6" fill="#34d399"/>
      <text x="34" y="22" font-size="13" font-weight="700" fill="#d1fae5">local-first</text>
      <rect class="chip" x="108" y="0" width="112" height="34" rx="17"/>
      <circle cx="127" cy="17" r="6" fill="#60a5fa"/>
      <text x="142" y="22" font-size="13" font-weight="700" fill="#dbeafe">SQLite truth</text>
      <rect class="chip" x="232" y="0" width="120" height="34" rx="17"/>
      <circle cx="251" cy="17" r="6" fill="#f59e0b"/>
      <text x="266" y="22" font-size="13" font-weight="700" fill="#fef3c7">field recall</text>
    </g>
  </g>

  <g class="font">
    <text class="label" x="70" y="187" fill="#67e8f9">Signals in</text>
    <rect class="panel" x="58" y="204" width="188" height="244" rx="16" fill="url(#signalGrad)"/>
    <g transform="translate(84 235)">
      <rect x="0" y="0" width="30" height="24" rx="6" fill="#22d3ee" fill-opacity="0.28" stroke="#22d3ee"/>
      <text class="body" x="44" y="18">Messages</text>
      <path d="M0 48 H140" stroke="#334155"/>
      <rect x="0" y="70" width="30" height="24" rx="6" fill="#34d399" fill-opacity="0.22" stroke="#34d399"/>
      <text class="body" x="44" y="88">Documents</text>
      <path d="M0 118 H140" stroke="#334155"/>
      <rect x="0" y="140" width="30" height="24" rx="6" fill="#60a5fa" fill-opacity="0.22" stroke="#60a5fa"/>
      <text class="body" x="44" y="158">Code &amp; notes</text>
      <path d="M0 188 H140" stroke="#334155"/>
      <rect x="0" y="210" width="30" height="24" rx="6" fill="#a78bfa" fill-opacity="0.22" stroke="#a78bfa"/>
      <text class="body" x="44" y="228">Events</text>
    </g>
  </g>

  <path d="M256 327 H313" stroke="#22d3ee" stroke-width="3" fill="none"/>
  <path d="M300 313 L316 327 L300 341" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <g class="font">
    <text class="label" x="326" y="187" fill="#34d399">Source of truth</text>
    <rect class="panel" x="310" y="204" width="190" height="244" rx="16" fill="url(#greenGrad)"/>
    <text x="362" y="249" font-size="25" font-weight="800" fill="#ecfdf5">SQLite</text>
    <text class="small" x="353" y="274">text + vectors + state</text>
    <g transform="translate(355 303)">
      <ellipse cx="50" cy="18" rx="54" ry="18" fill="#0f766e" stroke="#5eead4" stroke-width="2"/>
      <path d="M-4 18 V82 C-4 92 20 104 50 104 C80 104 104 92 104 82 V18" fill="#134e4a" stroke="#5eead4" stroke-width="2"/>
      <ellipse cx="50" cy="82" rx="54" ry="18" fill="#0f766e" fill-opacity="0.35" stroke="#5eead4" stroke-width="2"/>
    </g>
    <g transform="translate(336 420)">
      <circle cx="0" cy="0" r="5" fill="#34d399"/>
      <text class="tiny" x="14" y="5">namespaces, TTL, audit log</text>
    </g>
  </g>

  <path d="M510 327 H567" stroke="#34d399" stroke-width="3" fill="none"/>
  <path d="M554 313 L570 327 L554 341" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <g class="font">
    <text class="label" x="590" y="187" fill="#60a5fa">Candidate index</text>
    <rect class="panel" x="568" y="204" width="190" height="244" rx="16" fill="url(#blueGrad)"/>
    <text x="608" y="249" font-size="23" font-weight="800" fill="#eff6ff">Top-K search</text>
    <text class="small" x="617" y="274">FAISS / Qdrant / pgvector</text>
    <g transform="translate(663 341)">
      <circle cx="0" cy="0" r="66" fill="#082f49" stroke="#38bdf8" stroke-opacity="0.6"/>
      <circle cx="0" cy="0" r="12" fill="#0ea5e9" stroke="#bae6fd" stroke-width="2" filter="url(#glow)"/>
      <g stroke="#38bdf8" stroke-width="1.7" opacity="0.8">
        <path d="M0 0 L-46 -31"/>
        <path d="M0 0 L42 -40"/>
        <path d="M0 0 L48 35"/>
        <path d="M0 0 L-38 45"/>
      </g>
      <g fill="#38bdf8">
        <circle cx="-46" cy="-31" r="7"/>
        <circle cx="42" cy="-40" r="7"/>
        <circle cx="48" cy="35" r="7"/>
        <circle cx="-38" cy="45" r="7"/>
        <circle cx="-21" cy="-54" r="4"/>
        <circle cx="16" cy="-23" r="4"/>
        <circle cx="26" cy="11" r="4"/>
        <circle cx="-54" cy="8" r="4"/>
        <circle cx="9" cy="55" r="4"/>
      </g>
    </g>
  </g>

  <path d="M768 327 H825" stroke="#60a5fa" stroke-width="3" fill="none"/>
  <path d="M812 313 L828 327 L812 341" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <g class="font">
    <text class="label" x="846" y="187" fill="#fbbf24">Wave-field state</text>
    <rect class="panel" x="818" y="204" width="232" height="244" rx="16" fill="url(#amberGrad)"/>
    <circle cx="934" cy="322" r="104" fill="url(#fieldGlow)"/>
    <g fill="none" stroke="#f59e0b" stroke-width="1.4" opacity="0.86">
      <ellipse cx="934" cy="322" rx="24" ry="10"/>
      <ellipse cx="934" cy="322" rx="46" ry="19"/>
      <ellipse cx="934" cy="322" rx="68" ry="29"/>
      <ellipse cx="934" cy="322" rx="91" ry="39"/>
      <ellipse cx="934" cy="322" rx="112" ry="49"/>
    </g>
    <circle cx="934" cy="322" r="8" fill="#fbbf24" filter="url(#glow)"/>
    <g>
      <circle cx="870" cy="260" r="7" fill="#fb923c"/>
      <text x="885" y="265" font-size="14" font-weight="800" fill="#fed7aa">hotness</text>
      <circle cx="1004" cy="268" r="7" fill="#22c55e"/>
      <text x="1019" y="273" font-size="14" font-weight="800" fill="#bbf7d0">decay</text>
      <circle cx="870" cy="388" r="7" fill="#f59e0b"/>
      <text x="885" y="393" font-size="14" font-weight="800" fill="#fef3c7">TTL</text>
      <circle cx="1006" cy="390" r="7" fill="#60a5fa"/>
      <text x="1021" y="395" font-size="14" font-weight="800" fill="#bfdbfe">scope</text>
    </g>
    <rect x="852" y="413" width="164" height="24" rx="12" fill="#0b1220" stroke="#475569"/>
    <text class="tiny" x="870" y="430">relevance + recency + priority</text>
  </g>

  <path d="M1060 327 H1113" stroke="#f59e0b" stroke-width="3" fill="none"/>
  <path d="M1100 313 L1116 327 L1100 341" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <g class="font">
    <text class="label" x="930" y="503" fill="#a7f3d0">Useful recall</text>
    <rect class="panel" x="884" y="520" width="254" height="54" rx="16" fill="#052e2b" stroke="#34d399"/>
    <text x="910" y="546" font-size="16" font-weight="800" fill="#ecfdf5">small ranked context</text>
    <text class="small" x="910" y="565">ready for apps, agents, APIs</text>
  </g>

  <g class="font">
    <path d="M90 480 H1110" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 8"/>
    <g transform="translate(86 510)">
      <rect class="chip" width="138" height="42" rx="14"/>
      <circle cx="22" cy="21" r="8" fill="#34d399"/>
      <text x="40" y="26" font-size="14" font-weight="800" fill="#d1fae5">corrections</text>
    </g>
    <g transform="translate(244 510)">
      <rect class="chip" width="132" height="42" rx="14"/>
      <circle cx="22" cy="21" r="8" fill="#60a5fa"/>
      <text x="40" y="26" font-size="14" font-weight="800" fill="#dbeafe">backups</text>
    </g>
    <g transform="translate(396 510)">
      <rect class="chip" width="142" height="42" rx="14"/>
      <circle cx="22" cy="21" r="8" fill="#a78bfa"/>
      <text x="40" y="26" font-size="14" font-weight="800" fill="#ede9fe">traces</text>
    </g>
    <g transform="translate(558 510)">
      <rect class="chip" width="148" height="42" rx="14"/>
      <circle cx="22" cy="21" r="8" fill="#22d3ee"/>
      <text x="40" y="26" font-size="14" font-weight="800" fill="#cffafe">API / CLI</text>
    </g>
    <g transform="translate(726 510)">
      <rect class="chip" width="136" height="42" rx="14"/>
      <circle cx="22" cy="21" r="8" fill="#f59e0b"/>
      <text x="40" y="26" font-size="14" font-weight="800" fill="#fef3c7">benchmarks</text>
    </g>
  </g>

  <rect x="70" y="584" width="1060" height="5" rx="2.5" fill="url(#accentLine)"/>
</svg>
