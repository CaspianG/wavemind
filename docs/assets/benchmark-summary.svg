<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="980" viewBox="0 0 1180 980" role="img" aria-label="WaveMind benchmark summary">
<rect width="1180" height="980" fill="#f6f8fb" />
<text x="42" y="54" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="800" fill="#111827">WaveMind Benchmark Summary</text>
<text x="42" y="82" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#556070">Generated from repository JSON results. Planned public benchmarks are not drawn as wins.</text>
<rect x="40" y="120" width="520" height="245" rx="10" fill="#fff" stroke="#d7deea" />
<text x="64" y="156" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700" fill="#111827">Static agent-memory retrieval</text>
<text x="64" y="181" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#556070">200 facts, 50 natural-language queries, same hash embeddings.</text>
<text x="66" y="210" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#172033">WaveMind precision@1 0.82 | precision@3 0.90 | 2.25 ms</text>
<rect x="66" y="226" width="300" height="14" rx="7" fill="#e9edf4"/><rect x="66" y="226" width="270" height="14" rx="7" fill="#246bfe"/>
<text x="66" y="270" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#172033">Chroma precision@1 0.82 | precision@3 0.88 | 0.93 ms</text>
<rect x="66" y="286" width="300" height="14" rx="7" fill="#e9edf4"/><rect x="66" y="286" width="264" height="14" rx="7" fill="#64748b"/>
<rect x="620" y="120" width="520" height="245" rx="10" fill="#fff" stroke="#d7deea" />
<text x="644" y="156" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700" fill="#111827">Dynamic memory policy</text>
<text x="644" y="181" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#556070">Hotness, TTL, correction, stale suppression, namespace isolation.</text>
<text x="646" y="210" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#172033">WaveMind precision@1 1.00 | stale suppression 1.00 | 25.26 ms</text>
<rect x="646" y="226" width="300" height="14" rx="7" fill="#e9edf4"/><rect x="646" y="226" width="300" height="14" rx="7" fill="#0a7f5a"/>
<text x="646" y="270" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#172033">Chroma static precision@1 0.57 | stale suppression 0.00 | 1.75 ms</text>
<rect x="646" y="286" width="300" height="14" rx="7" fill="#e9edf4"/><rect x="646" y="286" width="171" height="14" rx="7" fill="#64748b"/>
<rect x="40" y="405" width="1100" height="205" rx="10" fill="#fff" stroke="#d7deea" />
<text x="64" y="441" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700" fill="#111827">Long-term memory evidence</text>
<text x="64" y="466" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#556070">Synthetic long-history evidence retrieval: profile, preference, correction, TTL, namespace, and filler noise.</text>
<text x="66" y="500" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#172033">WaveMind recall@5 1.00 | precision@1 1.00 | stale suppression 1.00 | 6.10 ms</text>
<rect x="66" y="516" width="320" height="14" rx="7" fill="#e9edf4"/><rect x="66" y="516" width="320" height="14" rx="7" fill="#7c3aed"/>
<text x="646" y="500" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#172033">Static vector recall@5 1.00 | precision@1 0.57 | stale suppression 0.00 | 0.65 ms</text>
<rect x="646" y="516" width="320" height="14" rx="7" fill="#e9edf4"/><rect x="646" y="516" width="183" height="14" rx="7" fill="#64748b"/>
<text x="66" y="584" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#344054">This is the first proof-shaped benchmark for dynamic agent memory. Public LoCoMo/LongMemEval results are still planned.</text>
<rect x="40" y="650" width="1100" height="275" rx="10" fill="#fff" stroke="#d7deea" />
<text x="64" y="686" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700" fill="#111827">Capacity and latency curve</text>
<text x="64" y="711" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#556070">WaveMind-only local runs on NumPy exact index. Quality stays high; dynamic ranking latency is the next target.</text>
<text x="66" y="760" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#111827">static p@1 is 0.94 at 5000 memories; dynamic policy p@1 is 1.00 through 5000 memories.</text>
<text x="66" y="790" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#344054">avg latency: static 13.71 ms at 5000; dynamic policy 48.36 ms at 5000.</text>
<text x="66" y="895" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#344054">Target: keep public retrieval quality at Chroma/Qdrant parity while cutting dynamic latency below 20 ms at 5000 memories.</text>
</svg>
